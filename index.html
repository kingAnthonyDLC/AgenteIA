<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automatización Industrial — Agente IA</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1c202b;
      --border:    #252830;
      --border2:   #2e323d;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --in-color:  #38bdf8;
      --out-color: #4ade80;
      --accent:    #818cf8;
      --accent2:   #c084fc;
      --ton-color: #fb923c;
      --tof-color: #f472b6;
      --p1-color:  #ef4444;
      --p2-color:  #f97316;
      --p3-color:  #4ade80;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 2.5rem 1.5rem 5rem; }

    /* ── MENÚ LATERAL ── */
    .sidenav { position: fixed; left: 1.25rem; top: 50%; transform: translateY(-50%); z-index: 200; display: flex; flex-direction: column; gap: .5rem; opacity: 0; pointer-events: none; transition: opacity .3s; max-height: 80vh; overflow-y: auto; scrollbar-width: none; }
    .sidenav::-webkit-scrollbar { display: none; }
    .sidenav.visible { opacity: 1; pointer-events: all; }
    .sidenav-item { display: flex; align-items: center; gap: .6rem; cursor: pointer; }
    .sidenav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); border: 2px solid var(--border2); transition: all .2s; flex-shrink: 0; }
    .sidenav-label { font-family: var(--mono); font-size: .7rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border2); padding: .18rem .55rem; border-radius: 5px; white-space: nowrap; opacity: 0; transform: translateX(-6px); transition: opacity .2s, transform .2s; pointer-events: none; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .sidenav-item:hover .sidenav-label { opacity: 1; transform: translateX(0); }
    .sidenav-item:hover .sidenav-dot   { background: var(--accent); border-color: var(--accent); transform: scale(1.3); }
    .sidenav-item.active .sidenav-dot  { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129,140,248,.2); }
    .sidenav-item.active .sidenav-label { color: var(--accent); }
    .sidenav-sep { height: 1px; background: var(--border); margin: .2rem 0 .2rem 4px; width: 16px; }
    @media (max-width: 900px) { .sidenav { display: none; } }

    /* ── PANEL FLOTANTE ── */
    .state-panel-float { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120px); z-index: 100; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: .65rem 1rem; display: flex; flex-wrap: wrap; gap: .45rem; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,.5); transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s; opacity: 0; pointer-events: none; max-width: 90vw; }
    .state-panel-float.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    .panel-label { font-family: var(--mono); font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-right: .35rem; white-space: nowrap; }

    /* ── HEADER ── */
    header { max-width: 980px; margin: 0 auto 2.5rem; display: flex; align-items: baseline; gap: 1rem; }
    header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header span { font-family: var(--mono); font-size: .75rem; color: var(--muted); border: 1px solid var(--border2); padding: .2rem .55rem; border-radius: 4px; }

    /* ── INPUT ── */
    .input-wrap { max-width: 980px; margin: 0 auto 2rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1.25rem; }
    .input-wrap label { display: block; font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .6rem; }
    textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: var(--sans); font-size: 1rem; line-height: 1.6; min-height: 72px; }
    textarea::placeholder { color: var(--muted); }
    .input-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: .9rem; margin-top: .75rem; }
    .hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); }
    button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: .6rem 1.4rem; border-radius: 8px; font-family: var(--sans); font-size: .9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: .5rem; transition: opacity .2s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTADO ── */
    #resultado { max-width: 980px; margin: 0 auto; display: none; }

    /* ── SECCIÓN GENÉRICA ── */
    .seccion { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; margin-bottom: 1.25rem; overflow: hidden; }
    .seccion-header { padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background .15s; }
    .seccion-header:hover { background: var(--surface2); }
    .seccion-header > .header-left { display: flex; align-items: center; gap: .75rem; }
    .seccion-header > span:first-child { font-size: .75rem; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); }
    .seccion-body { padding: 1.25rem; }
    .seccion-content { }
    .collapse-icon { font-size: .85rem; color: var(--muted); transition: transform .2s; }
    .collapsed .collapse-icon { transform: rotate(-90deg); }
    .collapsed .seccion-content { display: none; }

    /* ── BADGE PRIORIDAD ── */
    .badge-prioridad { font-family: var(--mono); font-size: .7rem; font-weight: 700; padding: .2rem .6rem; border-radius: 5px; white-space: nowrap; }
    .prio-1 { background: rgba(239,68,68,.15);  color: var(--p1-color); border: 1px solid rgba(239,68,68,.3); }
    .prio-2 { background: rgba(249,115,22,.15); color: var(--p2-color); border: 1px solid rgba(249,115,22,.3); }
    .prio-3 { background: rgba(74,222,128,.12); color: var(--p3-color); border: 1px solid rgba(74,222,128,.25); }

    /* ── VISTA GENERAL DEL SISTEMA ── */
    .sistema-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: .85rem 1rem; text-align: center; }
    .stat-valor { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; color: var(--accent); display: block; }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: .2rem; display: block; }

    .subsistemas-mapa { display: flex; flex-direction: column; gap: .6rem; }
    .mapa-item { display: flex; align-items: center; gap: .85rem; padding: .75rem 1rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; cursor: pointer; transition: border-color .2s; }
    .mapa-item:hover { border-color: var(--accent); }
    .mapa-info { flex: 1; }
    .mapa-nombre { font-size: .9rem; font-weight: 700; color: var(--text); }
    .mapa-desc   { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
    .mapa-vars   { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .2rem; }
    .mapa-arrow  { color: var(--muted); font-size: .85rem; }
    .dep-badge   { font-family: var(--mono); font-size: .68rem; color: var(--accent); background: rgba(129,140,248,.1); border: 1px solid rgba(129,140,248,.2); padding: .15rem .45rem; border-radius: 4px; }

    /* ── DEPENDENCIAS ── */
    .dep-panel { display: flex; flex-wrap: wrap; gap: .4rem; padding: .65rem 1.25rem; border-bottom: 1px solid var(--border); background: rgba(129,140,248,.04); }
    .dep-tag { font-family: var(--mono); font-size: .72rem; color: var(--accent); background: rgba(129,140,248,.1); border: 1px solid rgba(129,140,248,.2); padding: .18rem .5rem; border-radius: 4px; }
    .dep-label { font-size: .72rem; color: var(--muted); padding-top: .1rem; }

    /* ── RESUMEN / ANÁLISIS ── */
    .resumen-texto { color: #b0b4c0; font-size: .95rem; line-height: 1.65; margin-bottom: 1.1rem; }
    .expr-bloque { display: flex; flex-direction: column; gap: .75rem; }
    .expr-fila { display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap; }
    .expr-nombre { font-family: var(--mono); font-size: .85rem; color: var(--out-color); font-weight: 600; min-width: 60px; padding-top: .15rem; }
    .expr-detalles { display: flex; flex-direction: column; gap: .35rem; }
    .expr-linea { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .etiqueta { font-family: var(--mono); font-size: .68rem; color: var(--muted); min-width: 68px; text-transform: uppercase; letter-spacing: .05em; }
    .formula { font-family: var(--mono); font-size: .85rem; padding: .2rem .6rem; border-radius: 6px; word-break: break-all; }
    .formula-inferida { background: #1a1f2e; color: var(--accent);    border: 1px solid #2a3050; }
    .formula-canonica { background: #1a1a2e; color: #a78bfa;          border: 1px solid #3a2a60; }
    .formula-simple   { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .expr-desc { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

    /* ── VARIABLES ── */
    .vars-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: .85rem; margin-bottom: 1.25rem; }
    .var-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: .9rem 1.1rem; }
    .var-card h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .65rem; }
    .var-card.entradas h3 { color: var(--in-color); }
    .var-card.salidas  h3 { color: var(--out-color); }
    .badges { display: flex; flex-wrap: wrap; gap: .4rem; }
    .badge { font-family: var(--mono); font-size: .8rem; font-weight: 600; padding: .2rem .6rem; border-radius: 6px; }
    .badge-in   { background: #0c2a3a; color: var(--in-color);  border: 1px solid #1a4a5e; }
    .badge-out  { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .badge-ext  { background: #1a1a2e; color: var(--accent);    border: 1px solid #2a2a5e; }
    .badge-ton  { background: #2a1500; color: var(--ton-color); border: 1px solid #4a2500; }
    .badge-tof  { background: #2a0a1a; color: var(--tof-color); border: 1px solid #4a1a2a; }

    /* ── TABLA DE VERDAD ── */
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); }
    thead tr { background: #12151d; }
    th { padding: .6rem .9rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; text-align: center; white-space: nowrap; }
    th.col-in  { color: var(--in-color);  border-bottom: 2px solid var(--in-color); }
    th.col-out { color: var(--out-color); border-bottom: 2px solid var(--out-color); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: .5rem .9rem; text-align: center; font-size: .88rem; }
    .sep-col { width: 2px; background: var(--border2); padding: 0; }
    td.val-1-in  { color: var(--in-color); }
    td.val-0-in  { color: #334455; }
    td.val-1-out { color: var(--out-color); font-weight: 600; }
    td.val-0-out { color: #2a3a2a; }
    td.col-out   { background: rgba(74,222,128,.03); }

    /* ── KARNAUGH ── */
    .karnaugh-wrap { display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }
    .kmap-container { overflow-x: auto; }
    .kmap-table { border-collapse: separate; border-spacing: 4px; font-family: var(--mono); }
    .kmap-table th { background: transparent; border: none; color: var(--muted); font-size: .72rem; padding: .3rem .45rem; text-align: center; border-bottom: none; }
    .kmap-cell { width: 50px; height: 50px; text-align: center; vertical-align: middle; font-size: 1rem; font-weight: 600; border-radius: 7px; border: 2px solid var(--border2); background: var(--surface2); color: #334455; transition: all .2s; }
    .kmap-cell.val-1 { color: var(--text); background: #1a2030; }
    .kmap-corner { background: transparent !important; border: none !important; }
    .leyenda { display: flex; flex-direction: column; gap: .55rem; min-width: 155px; }
    .leyenda h4 { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .1rem; }
    .leyenda-item { display: flex; align-items: flex-start; gap: .5rem; }
    .leyenda-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; margin-top: .18rem; }
    .leyenda-texto { font-family: var(--mono); font-size: .82rem; color: var(--text); }
    .leyenda-mints { font-size: .68rem; color: var(--muted); font-family: var(--mono); }

    /* ── QUINE ── */
    .qm-paso { margin-bottom: 1.4rem; }
    .qm-paso:last-child { margin-bottom: 0; }
    .qm-titulo { font-size: .88rem; font-weight: 700; color: var(--accent); margin-bottom: .45rem; }
    .qm-explicacion { font-size: .8rem; color: var(--muted); line-height: 1.65; margin-bottom: .8rem; padding-left: .8rem; border-left: 2px solid var(--border2); }
    .qm-tabla { overflow-x: auto; }
    .qm-tabla table { font-size: .8rem; }
    .qm-tabla th { color: var(--accent); border-bottom: 1px solid var(--border2); font-size: .7rem; }
    .qm-tabla td { color: #b0b4c0; border-bottom: 1px solid var(--border); padding: .4rem .8rem; }
    .qm-tabla tr:last-child td { border-bottom: none; }
    .qm-tabla td.termino { color: var(--out-color); font-weight: 600; }
    .qm-tabla td.binario { color: var(--in-color); }

    /* ── MÉTODO BADGE ── */
    .metodo-badge { font-family: var(--mono); font-size: .68rem; padding: .16rem .5rem; border-radius: 4px; font-weight: 600; }
    .metodo-kmap  { background: #1a2a1a; color: var(--out-color); border: 1px solid #2a4a2a; }
    .metodo-quine { background: #1a1a2e; color: var(--accent);    border: 1px solid #2a2a4e; }
    .salida-titulo { font-size: .85rem; font-weight: 700; color: var(--out-color); margin-bottom: 1.1rem; display: flex; align-items: center; gap: .7rem; font-family: var(--mono); word-break: break-all; }
    .salida-titulo::after { content: ''; flex: 1; height: 1px; background: var(--border2); min-width: 20px; }

    /* ── LADDER ── */
    .ladder-wrap { overflow-x: auto; }
    .ladder-hint { font-size: .76rem; color: var(--muted); font-family: var(--mono); margin-bottom: 1rem; padding: .5rem .8rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
    .ladder-hint b { color: var(--in-color); }
    .state-panel { display: flex; flex-wrap: wrap; gap: .45rem; margin-bottom: 1.1rem; }
    .state-btn { font-family: var(--mono); font-size: .78rem; font-weight: 600; padding: .3rem .75rem; border-radius: 7px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: .35rem; }
    .state-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .18s; }
    .state-btn.on { border-color: var(--in-color); color: var(--in-color); background: #0c2a3a; }
    .state-btn.on .dot { background: var(--in-color); }
    .ladder-svg { display: block; }

    /* ── TIMERS ── */
    .timer-cards { display: flex; flex-direction: column; gap: .75rem; }
    .timer-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: .9rem 1.1rem; display: flex; gap: .85rem; align-items: flex-start; }
    .timer-badge { font-family: var(--mono); font-size: .76rem; font-weight: 700; padding: .28rem .65rem; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
    .timer-badge.ton { background: #2a1500; color: var(--ton-color); border: 1px solid #5a3000; }
    .timer-badge.tof { background: #2a0a1a; color: var(--tof-color); border: 1px solid #5a1a3a; }
    .timer-info { display: flex; flex-direction: column; gap: .28rem; }
    .timer-nombre { font-family: var(--mono); font-size: .86rem; font-weight: 600; }
    .timer-desc   { font-size: .8rem; color: var(--muted); line-height: 1.5; }
    .timer-meta   { display: flex; gap: .85rem; flex-wrap: wrap; margin-top: .15rem; }
    .timer-cond   { font-family: var(--mono); font-size: .73rem; color: var(--in-color); }
    .timer-time   { font-family: var(--mono); font-size: .73rem; color: var(--ton-color); }
    .timer-salida { font-family: var(--mono); font-size: .73rem; color: var(--out-color); }

    /* ── ERROR ── */
    .error-box { background: #1a0a0a; border: 1px solid #4a1a1a; border-radius: 10px; padding: .9rem 1.1rem; color: #f87171; font-family: var(--mono); font-size: .85rem; }

    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .vars-grid { grid-template-columns: 1fr; } .karnaugh-wrap { flex-direction: column; } .sistema-stats { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<nav class="sidenav" id="sidenav"></nav>

<header>
  <h1>AGENTE IA</h1>
  <span>by: Antohny De La Cruz Tigrero</span>
</header>

<div class="input-wrap">
  <label>Describe tu problema — combinacional, secuencial o sistema complejo</label>
  <textarea id="txt" placeholder="Ej simple: La alarma se activa si hay movimiento Y la puerta está abierta.&#10;Ej complejo: Sistema de control de planta con sensores de seguridad, arranque de motores y distribución de producto..."></textarea>
  <div class="input-footer">
    <span class="hint">Enter para enviar · Shift+Enter nueva línea</span>
    <button id="btn" onclick="enviar()"><span>Analizar</span></button>
  </div>
</div>

<div id="resultado"></div>
<div class="state-panel-float" id="state-panel-float"><span class="panel-label">Entradas</span></div>

<script>
/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
let ladderActivo = null;   // ladder del subsistema actualmente interactivo
let inputStates  = {};     // estados globales de entradas
let ssLadders    = {};     // { ssId: ladderData } para modulares

const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const res = document.getElementById('resultado');

txt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

/* ═══════════════════════════════════════
   ENVÍO
═══════════════════════════════════════ */
async function enviar() {
  const mensaje = txt.value.trim();
  if (!mensaje) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Analizando...</span>';
  res.style.display = 'none';
  ladderActivo = null; inputStates = {}; ssLadders = {};
  document.getElementById('sidenav').innerHTML = '';
  document.getElementById('sidenav').classList.remove('visible');

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: mensaje })
    });
    if (!r.ok) throw new Error(`Error del servidor: ${r.status}`);
    const data = await r.json();

    if (data.error) {
      res.innerHTML = `<div class="error-box fade-in">⚠ ${data.error}</div>`;
    } else {
      if (data.tipo === 'modular') {
        // Recolectar todas las entradas únicas
        const todasEntradas = new Set();
        (data.subsistemas || []).forEach(ss => (ss.entradas || []).forEach(v => todasEntradas.add(v)));
        todasEntradas.forEach(v => { inputStates[v] = 0; });
        // Guardar ladders por SS
        (data.subsistemas || []).forEach(ss => {
          if (ss.ladder) ssLadders[ss.id] = ss.ladder;
        });
        res.innerHTML = renderModular(data);
      } else if (data.tipo === 'combinacional') {
        (data.entradas || []).forEach(v => { inputStates[v] = 0; });
        ladderActivo = data.ladder || null;
        res.innerHTML = renderCombinacional(data);
      } else if (data.tipo === 'secuencial') {
        (data.entradas || []).forEach(v => { inputStates[v] = 0; });
        ladderActivo = data.ladder_secuencial || null;
        res.innerHTML = renderSecuencial(data);
      }
      const todasEntradas = Object.keys(inputStates);
      construirPanelFlotante(todasEntradas);
      setTimeout(() => { initSidenav(); initFloatPanel(); }, 120);
    }
    res.style.display = 'block';
  } catch(e) {
    res.innerHTML = `<div class="error-box fade-in">⚠ Error de conexión: ${e.message}</div>`;
    res.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = '<span>Analizar</span>';
}

/* ═══════════════════════════════════════
   RENDER MODULAR
═══════════════════════════════════════ */
function renderModular(d) {
  return renderVistaGeneral(d)
       + (d.subsistemas || []).map(ss => renderSubsistema(ss)).join('');
}

function renderVistaGeneral(d) {
  const e = d.estadisticas || {};
  const stats = [
    { v: d.subsistemas.length,    l: 'Subsistemas' },
    { v: e.total_entradas  || 0,  l: 'Entradas totales' },
    { v: e.total_salidas   || 0,  l: 'Salidas totales' },
    { v: e.total_escalones || 0,  l: 'Escalones Ladder' },
    { v: (e.por_prioridad||{}).emergencia  || 0, l: 'Emergencia' },
    { v: (e.por_prioridad||{}).advertencia || 0, l: 'Advertencia' },
    { v: (e.por_prioridad||{}).operacion   || 0, l: 'Operación' },
    { v: e.dependencias || 0,     l: 'Dependencias' },
  ].map(s => `
    <div class="stat-card">
      <span class="stat-valor">${s.v}</span>
      <span class="stat-label">${s.l}</span>
    </div>`).join('');

  const mapa = (d.subsistemas || []).map(ss => {
    const pc = ss.prioridad === 1 ? 'var(--p1-color)' : ss.prioridad === 2 ? 'var(--p2-color)' : 'var(--p3-color)';
    const pl = ss.prioridad === 1 ? 'EMERGENCIA' : ss.prioridad === 2 ? 'ADVERTENCIA' : 'OPERACIÓN';
    const deps = (ss.depende_de || []).map(d => `<span class="dep-badge">${d}</span>`).join(' ');
    return `
      <div class="mapa-item" onclick="irA('sec-${ss.id}')">
        <span class="badge-prioridad prio-${ss.prioridad}">P${ss.prioridad} · ${pl}</span>
        <div class="mapa-info">
          <div class="mapa-nombre">${ss.nombre}</div>
          <div class="mapa-desc">${ss.descripcion || ''}</div>
          <div class="mapa-vars">${(ss.entradas||[]).length} entradas · ${(ss.salidas||[]).length} salidas${deps ? ' · dep: '+deps : ''}</div>
        </div>
        <span class="mapa-arrow">→</span>
      </div>`;
  }).join('');

  return `
    <div class="seccion fade-in" id="sec-general">
      <div class="seccion-header" onclick="toggleSeccion('general')">
        <div class="header-left"><span>Vista general del sistema</span></div>
        <span class="collapse-icon">▾</span>
      </div>
      <div class="seccion-content" id="content-general">
        <div class="seccion-body">
          <p class="resumen-texto" style="margin-bottom:1.25rem">${d.resumen_general || ''}</p>
          <div class="sistema-stats">${stats}</div>
          <div class="subsistemas-mapa">${mapa}</div>
        </div>
      </div>
    </div>`;
}

function renderSubsistema(ss) {
  const pl = ss.prioridad === 1 ? 'EMERGENCIA' : ss.prioridad === 2 ? 'ADVERTENCIA' : 'OPERACIÓN';
  const deps = (ss.depende_de || []).length > 0
    ? `<div class="dep-panel">
         <span class="dep-label">Depende de:</span>
         ${(ss.depende_de).map(d => `<span class="dep-tag" onclick="irA('sec-${d}')">${d}</span>`).join('')}
       </div>` : '';

  const externas = ss.entradas_externas
    ? Object.entries(ss.entradas_externas).map(([v, origen]) =>
        `<span class="dep-tag" title="Viene de ${origen}">${v} ← ${origen}</span>`).join('')
    : '';
  const extPanel = externas
    ? `<div class="dep-panel"><span class="dep-label">Señales externas:</span>${externas}</div>` : '';

  const contenido = ss.error
    ? `<div class="seccion-body"><div class="error-box">${ss.error}</div></div>`
    : `${deps}${extPanel}
       <div class="seccion-body">
         ${renderAnalisisSubsistema(ss)}
         ${renderVarsSubsistema(ss)}
         ${renderTablaSubsistema(ss)}
         ${renderSimplificacionSubsistema(ss)}
         ${renderLadderSubsistema(ss)}
       </div>`;

  return `
    <div class="seccion fade-in" id="sec-${ss.id}">
      <div class="seccion-header" onclick="toggleSeccion('${ss.id}')">
        <div class="header-left">
          <span class="badge-prioridad prio-${ss.prioridad}">P${ss.prioridad} · ${pl}</span>
          <span style="color:var(--text);font-size:.88rem;font-weight:700">${ss.nombre}</span>
        </div>
        <span class="collapse-icon">▾</span>
      </div>
      <div class="seccion-content" id="content-${ss.id}">
        ${contenido}
      </div>
    </div>`;
}

function renderAnalisisSubsistema(ss) {
  if (!ss.salidas || ss.salidas.length === 0) return '';
  const exprs = ss.salidas.map(s => `
    <div class="expr-fila">
      <span class="expr-nombre">${s.nombre}</span>
      <div class="expr-detalles">
        <div class="expr-linea"><span class="etiqueta">inferida</span><span class="formula formula-inferida">${s.expresion_display || ''}</span></div>
        ${s.expresion_canonica ? `<div class="expr-linea"><span class="etiqueta">canónica</span><span class="formula formula-canonica">${s.expresion_canonica}</span></div>` : ''}
        ${s.expresion_simplificada ? `<div class="expr-linea"><span class="etiqueta">simplif.</span><span class="formula formula-simple">${s.expresion_simplificada}</span></div>` : ''}
        <div class="expr-desc">${s.descripcion || ''}</div>
      </div>
    </div>`).join('');
  return `<div class="expr-bloque" style="margin-bottom:1.25rem">${exprs}</div>`;
}

function renderVarsSubsistema(ss) {
  const bIn  = (ss.entradas || []).map(v => {
    const esExterna = ss.entradas_externas && ss.entradas_externas[v];
    return `<span class="badge ${esExterna ? 'badge-ext' : 'badge-in'}" title="${esExterna ? 'Viene de '+esExterna : ''}">${v}${esExterna ? ' ↗' : ''}</span>`;
  }).join('');
  const bOut = (ss.salidas || []).map(s => `<span class="badge badge-out">${s.nombre}</span>`).join('');
  return `
    <div class="vars-grid">
      <div class="var-card entradas"><h3>Entradas (${(ss.entradas||[]).length})</h3><div class="badges">${bIn || '—'}</div></div>
      <div class="var-card salidas"><h3>Salidas (${(ss.salidas||[]).length})</h3><div class="badges">${bOut || '—'}</div></div>
    </div>`;
}

function renderTablaSubsistema(ss) {
  if (!ss.tabla || ss.tabla.length === 0) return '';
  const nombres = (ss.salidas || []).map(s => s.nombre);
  const thIn  = (ss.entradas || []).map(v => `<th class="col-in">${v}</th>`).join('');
  const thOut = nombres.map(n => `<th class="col-out">${n}</th>`).join('');

  // Mostrar máximo 32 filas para no saturar
  const tablaVis  = ss.tabla.length > 32 ? ss.tabla.slice(0, 32) : ss.tabla;
  const truncado  = ss.tabla.length > 32;

  const filas = tablaVis.map(fila => {
    const tdIn  = (ss.entradas||[]).map(v => `<td class="${fila[v]===1?'val-1-in':'val-0-in'}">${fila[v]}</td>`).join('');
    const tdOut = nombres.map(n => `<td class="col-out ${fila[n]===1?'val-1-out':'val-0-out'}">${fila[n]===-1?'?':fila[n]}</td>`).join('');
    return `<tr>${tdIn}<td class="sep-col"></td>${tdOut}</tr>`;
  }).join('');

  return `
    <div class="seccion" style="margin-bottom:1.1rem">
      <div class="seccion-header" onclick="toggleSeccion('tabla-${ss.id}')">
        <span>Tabla de verdad</span>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">${ss.tabla.length} filas · ${(ss.entradas||[]).length+(nombres.length)} cols</span>
          <span class="collapse-icon">▾</span>
        </div>
      </div>
      <div class="seccion-content" id="content-tabla-${ss.id}">
        <div class="tabla-scroll">
          <table><thead><tr>${thIn}<th class="sep-col"></th>${thOut}</tr></thead><tbody>${filas}</tbody></table>
        </div>
        ${truncado ? `<div style="padding:.6rem 1rem;font-family:var(--mono);font-size:.72rem;color:var(--muted)">Mostrando 32 de ${ss.tabla.length} filas</div>` : ''}
      </div>
    </div>`;
}

function renderSimplificacionSubsistema(ss) {
  if (!ss.salidas) return '';
  return ss.salidas.map((s, idx) => {
    if (!s.expresion_simplificada) return '';
    const badge = s.metodo === 'karnaugh'
      ? '<span class="metodo-badge metodo-kmap">Karnaugh</span>'
      : '<span class="metodo-badge metodo-quine">Quine-McCluskey</span>';
    const contenido = s.metodo === 'karnaugh' ? renderKarnaugh(s) : renderQuine(s);
    const sid = `simp-${ss.id}-${idx}`;
    return `
      <div class="seccion" style="margin-bottom:1.1rem">
        <div class="seccion-header" onclick="toggleSeccion('${sid}')">
          <div class="header-left"><span>Simplificación — ${s.nombre}</span>${badge}</div>
          <span class="collapse-icon">▾</span>
        </div>
        <div class="seccion-content" id="content-${sid}">
          <div class="seccion-body">
            <div class="salida-titulo">${s.nombre} = ${s.expresion_simplificada}</div>
            ${contenido}
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderLadderSubsistema(ss) {
  if (!ss.ladder || !ss.ladder.salidas || ss.ladder.salidas.length === 0) return '';
  const ssId   = ss.id;
  const botones = (ss.entradas || []).map(v => `
    <button class="state-btn" id="sbtn-${ssId}-${v}" onclick="toggleInputSS('${ssId}','${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');

  return `
    <div class="seccion" style="margin-bottom:1.1rem" id="ladder-${ssId}">
      <div class="seccion-header" onclick="toggleSeccion('lad-${ssId}')">
        <span>Diagrama Ladder — ${ss.nombre}</span>
        <span class="collapse-icon">▾</span>
      </div>
      <div class="seccion-content" id="content-lad-${ssId}">
        <div class="seccion-body">
          <div class="ladder-hint"><b>Clic</b> en entradas para simular</div>
          <div class="state-panel" id="panel-inline-${ssId}">${botones}</div>
          <div class="ladder-wrap" id="ladder-svg-${ssId}">
            ${dibujarLadderCombinacional(ss.ladder, ss.entradas || [])}
          </div>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   RENDER COMBINACIONAL
═══════════════════════════════════════ */
function renderCombinacional(d) {
  const exprs = (d.salidas||[]).map(s => `
    <div class="expr-fila">
      <span class="expr-nombre">${s.nombre}</span>
      <div class="expr-detalles">
        <div class="expr-linea"><span class="etiqueta">inferida</span><span class="formula formula-inferida">${s.expresion_display}</span></div>
        <div class="expr-linea"><span class="etiqueta">canónica</span><span class="formula formula-canonica">${s.expresion_canonica}</span></div>
        <div class="expr-linea"><span class="etiqueta">simplif.</span><span class="formula formula-simple">${s.expresion_simplificada}</span></div>
        <div class="expr-desc">${s.descripcion}</div>
      </div>
    </div>`).join('');

  const bIn  = (d.entradas||[]).map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = (d.salidas||[]).map(s => `<span class="badge badge-out">${s.nombre}</span>`).join('');
  const nombres = (d.salidas||[]).map(s => s.nombre);
  const thIn  = (d.entradas||[]).map(v => `<th class="col-in">${v}</th>`).join('');
  const thOut = nombres.map(n => `<th class="col-out">${n}</th>`).join('');
  const filas = (d.tabla||[]).map(fila => {
    const tdIn  = (d.entradas||[]).map(v => `<td class="${fila[v]===1?'val-1-in':'val-0-in'}">${fila[v]}</td>`).join('');
    const tdOut = nombres.map(n => `<td class="col-out ${fila[n]===1?'val-1-out':'val-0-out'}">${fila[n]===-1?'?':fila[n]}</td>`).join('');
    return `<tr>${tdIn}<td class="sep-col"></td>${tdOut}</tr>`;
  }).join('');

  const simplif = (d.salidas||[]).map((s, idx) => {
    const badge = s.metodo==='karnaugh'
      ? '<span class="metodo-badge metodo-kmap">Karnaugh</span>'
      : '<span class="metodo-badge metodo-quine">Quine-McCluskey</span>';
    const cont = s.metodo==='karnaugh' ? renderKarnaugh(s) : renderQuine(s);
    const secId = idx===0 ? 'id="sec-simplificacion"' : '';
    return `
      <div class="seccion fade-in" ${secId}>
        <div class="seccion-header" onclick="toggleSeccion('simp-${idx}')">
          <div class="header-left"><span>Simplificación — ${s.nombre}</span>${badge}</div>
          <span class="collapse-icon">▾</span>
        </div>
        <div class="seccion-content" id="content-simp-${idx}">
          <div class="seccion-body">
            <div class="salida-titulo">${s.nombre} = ${s.expresion_simplificada}</div>
            ${cont}
          </div>
        </div>
      </div>`;
  }).join('');

  const botones = (d.entradas||[]).map(v => `
    <button class="state-btn" id="sbtn-${v}" onclick="toggleInput('${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');

  return `
    <div class="seccion fade-in" id="sec-analisis">
      <div class="seccion-header"><span>Análisis lógico</span></div>
      <div class="seccion-body"><p class="resumen-texto">${d.resumen||''}</p><div class="expr-bloque">${exprs}</div></div>
    </div>
    <div class="vars-grid fade-in" id="sec-vars">
      <div class="var-card entradas"><h3>Entradas (${(d.entradas||[]).length})</h3><div class="badges">${bIn}</div></div>
      <div class="var-card salidas"><h3>Salidas (${(d.salidas||[]).length})</h3><div class="badges">${bOut}</div></div>
    </div>
    <div class="seccion fade-in" id="sec-tabla">
      <div class="seccion-header" onclick="toggleSeccion('tabla-comb')">
        <span>Tabla de verdad</span>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">${(d.tabla||[]).length} filas</span>
          <span class="collapse-icon">▾</span>
        </div>
      </div>
      <div class="seccion-content" id="content-tabla-comb">
        <div class="tabla-scroll"><table><thead><tr>${thIn}<th class="sep-col"></th>${thOut}</tr></thead><tbody>${filas}</tbody></table></div>
      </div>
    </div>
    ${simplif}
    <div class="seccion fade-in" id="ladder-seccion">
      <div class="seccion-header"><span>Diagrama Ladder</span><span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">combinacional · interactivo</span></div>
      <div class="seccion-body">
        <div class="ladder-hint"><b>Haz clic</b> en las entradas para simular</div>
        <div class="state-panel" id="state-panel-inline">${botones}</div>
        <div class="ladder-wrap" id="ladder-svg-wrap">${dibujarLadderCombinacional(d.ladder, d.entradas||[])}</div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   RENDER SECUENCIAL
═══════════════════════════════════════ */
function renderSecuencial(d) {
  const bIn  = (d.entradas||[]).map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = (d.salidas||[]).map(v => `<span class="badge badge-out">${v}</span>`).join('');
  const cards = (d.resumen_timers||[]).map(t => `
    <div class="timer-card">
      <span class="timer-badge ${t.tipo.toLowerCase()}">${t.tipo}</span>
      <div class="timer-info">
        <span class="timer-nombre">${t.nombre}</span>
        <span class="timer-desc">${t.descripcion}</span>
        <div class="timer-meta">
          <span class="timer-cond">↳ ${t.condicion}</span>
          <span class="timer-time">⏱ ${t.tiempo_display}</span>
          <span class="timer-salida">→ ${t.salida}</span>
        </div>
      </div>
    </div>`).join('');

  const botones = (d.entradas||[]).map(v => `
    <button class="state-btn" id="sbtn-${v}" onclick="toggleInput('${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');

  return `
    <div class="seccion fade-in" id="sec-analisis">
      <div class="seccion-header"><span>Análisis del proceso</span><span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">secuencial</span></div>
      <div class="seccion-body"><p class="resumen-texto">${d.resumen||''}</p></div>
    </div>
    <div class="vars-grid fade-in" id="sec-vars">
      <div class="var-card entradas"><h3>Entradas</h3><div class="badges">${bIn||'—'}</div></div>
      <div class="var-card salidas"><h3>Salidas</h3><div class="badges">${bOut||'—'}</div></div>
    </div>
    <div class="seccion fade-in" id="sec-simplificacion">
      <div class="seccion-header"><span>Temporizadores identificados</span></div>
      <div class="seccion-body"><div class="timer-cards">${cards}</div></div>
    </div>
    <div class="seccion fade-in" id="ladder-seccion">
      <div class="seccion-header"><span>Diagrama Ladder</span><span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">secuencial · interactivo</span></div>
      <div class="seccion-body">
        <div class="ladder-hint"><b>Clic</b> en entradas para simular · Los bloques TON/TOF muestran estado de activación</div>
        <div class="state-panel" id="state-panel-inline">${botones}</div>
        <div class="ladder-wrap" id="ladder-svg-wrap">${dibujarLadderSecuencial(d.ladder_secuencial)}</div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   KARNAUGH
═══════════════════════════════════════ */
function renderKarnaugh(s) {
  const k = s.karnaugh;
  if (!k || !k.mapa || k.mapa.length === 0)
    return `<p style="color:var(--muted);font-size:.85rem">${s.expresion_simplificada==='0'?'Salida siempre 0.':'Salida siempre 1.'}</p>`;
  const minterms = new Set(k.minterms||[]);
  const grupos   = k.grupos||[];
  const cc = {};
  grupos.forEach(g => g.celdas.forEach(c => { if (!cc[c]) cc[c] = g.color; }));

  let thead = '<tr><th class="kmap-corner"> </th>';
  (k.col_labels||[]).forEach(cl => { thead += `<th>${cl}</th>`; });
  thead += '</tr>';

  let tbody = '';
  k.mapa.forEach((fila, ri) => {
    tbody += `<tr><th>${(k.fila_labels||[])[ri]||''}</th>`;
    fila.forEach(idx => {
      const val = minterms.has(idx)?1:0;
      const col = cc[idx]||null;
      const st  = col?`border-color:${col};box-shadow:0 0 0 2px ${col}33;background:${col}15;`:'';
      tbody += `<td class="kmap-cell${val===1?' val-1':''}${col?' resaltado':''}" style="${st}" title="m${idx}">${val}</td>`;
    });
    tbody += '</tr>';
  });

  const items = grupos.map(g => `
    <div class="leyenda-item">
      <div class="leyenda-dot" style="background:${g.color}"></div>
      <div><div class="leyenda-texto">${g.termino}</div><div class="leyenda-mints">m(${g.celdas.join(', ')})</div></div>
    </div>`).join('');

  return `
    <div class="karnaugh-wrap">
      <div class="kmap-container"><table class="kmap-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>
      <div class="leyenda"><h4>Grupos</h4>${items||'Sin grupos'}</div>
    </div>`;
}

/* ═══════════════════════════════════════
   QUINE
═══════════════════════════════════════ */
function renderQuine(s) {
  if (!s.quine_pasos || s.quine_pasos.length===0)
    return `<p style="color:var(--muted);font-size:.85rem">Sin pasos.</p>`;
  const sep = '<hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0">';
  return s.quine_pasos.map(paso => {
    let t = '';
    if (paso.tipo==='tabla_minterms')
      t = buildQmTable(paso.columnas, paso.filas.map(f=>`<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td style="text-align:center">${f.unos}</td></tr>`).join(''));
    else if (paso.tipo==='tabla_combinaciones')
      t = buildQmTable(paso.columnas, paso.filas.map(f=>`<tr><td>${f.combinacion}</td><td class="binario">${f.resultado}</td><td class="termino">${f.termino}</td></tr>`).join(''));
    else if (paso.tipo==='tabla_implicantes')
      t = buildQmTable(paso.columnas, paso.filas.map(f=>`<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td class="termino">${f.termino}</td></tr>`).join(''));
    return `<div class="qm-paso"><div class="qm-titulo">${paso.titulo}</div><div class="qm-explicacion">${paso.explicacion}</div>${t}</div>`;
  }).join(sep);
}
function buildQmTable(cols, filas) {
  return `<div class="qm-tabla"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${filas}</tbody></table></div>`;
}

/* ═══════════════════════════════════════
   TOGGLE ENTRADAS
═══════════════════════════════════════ */
function toggleInput(v) {
  inputStates[v] = inputStates[v]===1 ? 0 : 1;
  actualizarBotones(v);
  const wrap = document.getElementById('ladder-svg-wrap');
  if (wrap && ladderActivo) {
    wrap.innerHTML = ladderActivo.tipo==='secuencial'
      ? dibujarLadderSecuencial(ladderActivo)
      : dibujarLadderCombinacional(ladderActivo, Object.keys(inputStates));
  }
}

function toggleInputSS(ssId, v) {
  inputStates[v] = inputStates[v]===1 ? 0 : 1;
  actualizarBotones(v);
  // Redibujar el ladder del subsistema específico
  const wrap = document.getElementById(`ladder-svg-${ssId}`);
  const ld   = ssLadders[ssId];
  if (wrap && ld) {
    const ss = (window._ssData||[]).find(s => s.id === ssId);
    wrap.innerHTML = dibujarLadderCombinacional(ld, ss ? ss.entradas : Object.keys(inputStates));
  }
}

function actualizarBotones(v) {
  document.querySelectorAll(`[id$="-${v}"]`).forEach(b => {
    if (b.classList.contains('state-btn')) b.classList.toggle('on', inputStates[v]===1);
  });
}

/* ═══════════════════════════════════════
   SVG LADDER COMBINACIONAL
═══════════════════════════════════════ */
function dibujarLadderCombinacional(ladder, entradas) {
  const salidas = ladder.salidas || [];
  const RL=30, RO=120, RH=70, CW=55, CH=28, CR=18, PT=30, PB=30;
  let maxCt=0;
  salidas.forEach(s=>s.escalones.forEach(e=>{if(e.contactos.length>maxCt)maxCt=e.contactos.length;}));
  const AW=Math.max(420,maxCt*(CW+16)+80);
  const RR=RL+AW;
  let nFilas=0; salidas.forEach(s=>{nFilas+=s.escalones.length;}); nFilas+=Math.max(0,salidas.length-1);
  const SH=PT+nFilas*RH+PB, SW=RR+RO+20;
  const CA='#4ade80',CI='#2e323d',CM='#6b7080',CT='#e8eaf0',CNC='#38bdf8',BG='#161920';
  let els=[];
  els.push(`<line x1="${RL}" y1="${PT-10}" x2="${RL}" y2="${SH-PB+10}" stroke="${CI}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<line x1="${RR}" y1="${PT-10}" x2="${RR}" y2="${SH-PB+10}" stroke="${CI}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<text x="${RL}" y="${PT-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L+</text>`);
  els.push(`<text x="${RR}" y="${PT-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L-</text>`);
  let cY=PT; let prim=true;
  salidas.forEach(sal=>{
    if(!prim) els.push(`<line x1="${RL+10}" y1="${cY-10}" x2="${RR-10}" y2="${cY-10}" stroke="${CI}" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>`);
    prim=false;
    const nE=sal.escalones.length, bH=nE*RH, mY=cY+bH/2;
    const bA=sal.escalones.some(e=>e.contactos.every(ct=>{const v=inputStates[ct.var]!==undefined?inputStates[ct.var]:0;return ct.negado?v===0:v===1;}));
    if(nE>1) els.push(`<line x1="${RL+4}" y1="${cY+RH/2}" x2="${RL+4}" y2="${cY+bH-RH/2}" stroke="${CI}" stroke-width="2.5"/>`);
    sal.escalones.forEach((esc,ei)=>{
      const my=cY+ei*RH+RH/2;
      const eA=esc.contactos.every(ct=>{const v=inputStates[ct.var]!==undefined?inputStates[ct.var]:0;return ct.negado?v===0:v===1;});
      const wc=eA?CA:CI;
      els.push(`<line x1="${RL+4}" y1="${my}" x2="${RL+30}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
      let xC=RL+30;
      esc.contactos.forEach((ct,ci)=>{
        const v=inputStates[ct.var]!==undefined?inputStates[ct.var]:0;
        const ca=ct.negado?v===0:v===1;
        const cc=ca?CA:CI, lc=ct.negado?CNC:CT;
        if(ci>0){els.push(`<line x1="${xC}" y1="${my}" x2="${xC+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`);xC+=10;}
        const cx=xC+CW/2;
        els.push(`<line x1="${cx-10}" y1="${my-CH/2}" x2="${cx-10}" y2="${my+CH/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx+10}" y1="${my-CH/2}" x2="${cx+10}" y2="${my+CH/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx-10}" y1="${my}" x2="${cx+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`);
        if(ct.negado) els.push(`<line x1="${cx-8}" y1="${my+CH/2-4}" x2="${cx+8}" y2="${my-CH/2+4}" stroke="${cc}" stroke-width="2"/>`);
        els.push(`<text x="${cx}" y="${my-CH/2-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${lc}">${ct.negado?ct.var+"'":ct.var}</text>`);
        xC+=CW;
      });
      els.push(`<line x1="${xC}" y1="${my}" x2="${RR-4}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
    });
    if(nE>1) els.push(`<line x1="${RR-4}" y1="${cY+RH/2}" x2="${RR-4}" y2="${cY+bH-RH/2}" stroke="${CI}" stroke-width="2.5"/>`);
    const bc=bA?CA:CI, cx=RR+40;
    els.push(`<line x1="${RR-4}" y1="${mY}" x2="${cx-CR}" y2="${mY}" stroke="${bc}" stroke-width="2.5"/>`);
    els.push(`<circle cx="${cx}" cy="${mY}" r="${CR}" fill="${bA?'#0c2a1a':'#12151d'}" stroke="${bA?CA:'#2e323d'}" stroke-width="2.5"/>`);
    els.push(`<text x="${cx}" y="${mY+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="${bA?CA:CM}">( )</text>`);
    els.push(`<text x="${cx}" y="${mY-CR-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${bA?CA:CM}">${sal.nombre}</text>`);
    els.push(`<line x1="${cx+CR}" y1="${mY}" x2="${RR+RO-10}" y2="${mY}" stroke="${bc}" stroke-width="2.5"/>`);
    cY+=nE*RH;
  });
  return `<svg class="ladder-svg" width="${SW}" height="${SH}" viewBox="0 0 ${SW} ${SH}" xmlns="http://www.w3.org/2000/svg"><rect width="${SW}" height="${SH}" fill="${BG}" rx="10"/>${els.join('')}</svg>`;
}

/* ═══════════════════════════════════════
   SVG LADDER SECUENCIAL
═══════════════════════════════════════ */
function dibujarLadderSecuencial(ladder) {
  const escalones=ladder.escalones||[];
  const RL=30,RO=160,RH=80,CW=65,CH=28,TW=100,TH=52,CR=18,PT=30,PB=30;
  const AW=Math.max(500,escalones.length>0?escalones.reduce((m,e)=>Math.max(m,e.contactos.length*(CW+12)+(e.timer?TW+20:CR*2+20)),0)+60:500);
  const RR=RL+AW, SH=PT+escalones.length*RH+PB, SW=RR+RO+20;
  const CA='#4ade80',CI='#2e323d',CM='#6b7080',CT='#e8eaf0',CNC='#38bdf8',BG='#161920',CTON='#fb923c',CTOF='#f472b6';
  let els=[];
  els.push(`<line x1="${RL}" y1="${PT-10}" x2="${RL}" y2="${SH-PB+10}" stroke="${CI}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<line x1="${RR}" y1="${PT-10}" x2="${RR}" y2="${SH-PB+10}" stroke="${CI}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<text x="${RL}" y="${PT-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L+</text>`);
  els.push(`<text x="${RR}" y="${PT-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L-</text>`);
  escalones.forEach((esc,i)=>{
    const my=PT+i*RH+RH/2;
    if(i>0) els.push(`<line x1="${RL+10}" y1="${my-RH/2}" x2="${RR-10}" y2="${my-RH/2}" stroke="${CI}" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>`);
    const cA=esc.contactos.every(ct=>{if(ct.es_timer)return false;const v=inputStates[ct.var]!==undefined?inputStates[ct.var]:0;return ct.negado?v===0:v===1;});
    const wc=cA?CA:CI;
    els.push(`<line x1="${RL+4}" y1="${my}" x2="${RL+30}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
    let xC=RL+30;
    esc.contactos.forEach((ct,ci)=>{
      if(ci>0){els.push(`<line x1="${xC}" y1="${my}" x2="${xC+10}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);xC+=10;}
      const cx=xC+CW/2;
      if(ct.es_timer){
        const tc=ct.tipo_timer==='TON'?CTON:CTOF;
        els.push(`<rect x="${cx-18}" y="${my-14}" width="36" height="28" rx="4" fill="none" stroke="${tc}" stroke-width="1.5" stroke-dasharray="4 2"/>`);
        els.push(`<text x="${cx}" y="${my+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="10" font-weight="600" fill="${tc}">${ct.var}</text>`);
        els.push(`<text x="${cx}" y="${my-20}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="${tc}">${ct.tipo_timer}</text>`);
      } else {
        const v=inputStates[ct.var]!==undefined?inputStates[ct.var]:0;
        const ca=ct.negado?v===0:v===1;
        const cc=ca?CA:CI,lc=ct.negado?CNC:CT;
        els.push(`<line x1="${cx-10}" y1="${my-CH/2}" x2="${cx-10}" y2="${my+CH/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx+10}" y1="${my-CH/2}" x2="${cx+10}" y2="${my+CH/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx-10}" y1="${my}" x2="${cx+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`);
        if(ct.negado) els.push(`<line x1="${cx-8}" y1="${my+CH/2-4}" x2="${cx+8}" y2="${my-CH/2+4}" stroke="${cc}" stroke-width="2"/>`);
        els.push(`<text x="${cx}" y="${my-CH/2-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${lc}">${ct.negado?ct.var+"'":ct.var}</text>`);
      }
      xC+=CW;
    });
    els.push(`<line x1="${xC}" y1="${my}" x2="${xC+14}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
    xC+=14;
    if(esc.tipo==='timer_coil'&&esc.timer){
      const t=esc.timer, tc=t.tipo==='TON'?CTON:CTOF, tf=cA?'#2a1200':'#12151d';
      const bx=xC, by=my-TH/2;
      els.push(`<rect x="${bx}" y="${by}" width="${TW}" height="${TH}" rx="6" fill="${tf}" stroke="${cA?tc:'#2e323d'}" stroke-width="2"/>`);
      els.push(`<text x="${bx+TW/2}" y="${by+14}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="700" fill="${tc}">${t.tipo}</text>`);
      els.push(`<text x="${bx+TW/2}" y="${by+28}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CT}">${t.nombre}</text>`);
      els.push(`<text x="${bx+TW/2}" y="${by+42}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${cA?tc:CM}">PT: ${t.tiempo_display}</text>`);
      els.push(`<line x1="${bx+TW}" y1="${my}" x2="${RR-4}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
      els.push(`<text x="${bx+TW/2}" y="${by-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="${CM}">bobina timer</text>`);
    } else if(esc.tipo==='timer_contact'){
      const cx2=xC+CR+5;
      els.push(`<line x1="${xC}" y1="${my}" x2="${cx2-CR}" y2="${my}" stroke="${CI}" stroke-width="2.5"/>`);
      els.push(`<circle cx="${cx2}" cy="${my}" r="${CR}" fill="#12151d" stroke="#2e323d" stroke-width="2.5"/>`);
      els.push(`<text x="${cx2}" y="${my+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="${CM}">( )</text>`);
      els.push(`<text x="${cx2}" y="${my-CR-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${CM}">${esc.bobina}</text>`);
      els.push(`<line x1="${cx2+CR}" y1="${my}" x2="${RR+RO-10}" y2="${my}" stroke="${CI}" stroke-width="2.5"/>`);
    }
  });
  return `<svg class="ladder-svg" width="${SW}" height="${SH}" viewBox="0 0 ${SW} ${SH}" xmlns="http://www.w3.org/2000/svg"><rect width="${SW}" height="${SH}" fill="${BG}" rx="10"/>${els.join('')}</svg>`;
}

/* ═══════════════════════════════════════
   COLAPSAR SECCIONES
═══════════════════════════════════════ */
function toggleSeccion(id) {
  const sec = document.getElementById(`content-${id}`);
  const hdr = sec ? sec.closest('.seccion') : null;
  if (!sec || !hdr) return;
  hdr.classList.toggle('collapsed');
}

/* ═══════════════════════════════════════
   PANEL FLOTANTE
═══════════════════════════════════════ */
function construirPanelFlotante(entradas) {
  const panel = document.getElementById('state-panel-float');
  panel.innerHTML = '<span class="panel-label">Entradas</span>';
  entradas.forEach(v => {
    const b = document.createElement('button');
    b.className = 'state-btn'; b.id = `sbtn-float-${v}`; b.onclick = () => toggleInput(v);
    b.innerHTML = `<span class="dot"></span>${v}`; panel.appendChild(b);
  });
}

function initFloatPanel() {
  const seccion     = document.getElementById('ladder-seccion');
  const panelInline = document.getElementById('state-panel-inline');
  const panelFloat  = document.getElementById('state-panel-float');
  if (!seccion || !panelFloat || !panelInline) return;
  function actualizar() {
    const sr=seccion.getBoundingClientRect(), ir=panelInline.getBoundingClientRect();
    panelFloat.classList.toggle('visible', sr.bottom>0&&sr.top<window.innerHeight&&!(ir.bottom>80&&ir.top<window.innerHeight));
  }
  window.addEventListener('scroll', actualizar, {passive:true}); actualizar();
}

/* ═══════════════════════════════════════
   MENÚ LATERAL
═══════════════════════════════════════ */
function irA(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function initSidenav() {
  const nav = document.getElementById('sidenav');
  if (!nav) return;

  // Detectar tipo de resultado
  const esModular      = !!document.getElementById('sec-general');
  const esCombinacional = !!document.getElementById('sec-analisis') && !esModular;

  nav.innerHTML = '';

  if (esModular) {
    // Ítem general
    nav.innerHTML += navItem('sec-general', 'Vista general', null);
    nav.innerHTML += '<div class="sidenav-sep"></div>';
    // Un ítem por subsistema
    document.querySelectorAll('[id^="sec-SS"]').forEach(el => {
      const id    = el.id;
      const ssId  = id.replace('sec-', '');
      const hdr   = el.querySelector('.header-left span:last-child');
      const label = hdr ? hdr.textContent.trim() : ssId;
      const badge = el.querySelector('.badge-prioridad');
      const color = badge && badge.classList.contains('prio-1') ? '#ef4444'
                  : badge && badge.classList.contains('prio-2') ? '#f97316'
                  : '#4ade80';
      nav.innerHTML += navItem(id, label, color);
    });
  } else {
    const items = [
      {id:'sec-analisis',       label:'Análisis lógico'},
      {id:'sec-vars',           label:'Variables'},
      {id:'sec-tabla',          label:'Tabla de verdad'},
      {id:'sec-simplificacion', label:'Simplificación'},
      {id:'ladder-seccion',     label:'Diagrama Ladder'},
    ];
    items.forEach(it => {
      if (document.getElementById(it.id))
        nav.innerHTML += navItem(it.id, it.label, null);
    });
  }

  nav.classList.add('visible');

  // IntersectionObserver para resaltar ítem activo
  const dots = nav.querySelectorAll('.sidenav-item');
  const ids  = Array.from(dots).map(d => d.dataset.target);
  const obs   = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const idx = ids.indexOf(e.target.id);
      if (idx !== -1) dots[idx]?.classList.toggle('active', e.isIntersecting);
    });
  }, {threshold: 0.2});
  ids.forEach(id => { const el=document.getElementById(id); if(el) obs.observe(el); });
}

function navItem(id, label, color) {
  const dotStyle = color ? `background:${color};border-color:${color}` : '';
  return `<div class="sidenav-item" data-target="${id}" onclick="irA('${id}')">
    <div class="sidenav-dot" style="${dotStyle}"></div>
    <span class="sidenav-label">${label}</span>
  </div>`;
}
</script>
</body>
