<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Verdad — Agente IA</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1c202b;
      --border:    #252830;
      --border2:   #2e323d;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --in-color:  #38bdf8;
      --out-color: #4ade80;
      --accent:    #818cf8;
      --accent2:   #c084fc;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── MENÚ LATERAL ── */
    .sidenav {
      position: fixed;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: .6rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sidenav.visible { opacity: 1; pointer-events: all; }
    .sidenav-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      cursor: pointer;
    }
    .sidenav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border2);
      border: 2px solid var(--border2);
      transition: all .2s;
      flex-shrink: 0;
    }
    .sidenav-label {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: .2rem .6rem;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    .sidenav-item:hover .sidenav-label { opacity: 1; transform: translateX(0); }
    .sidenav-item:hover .sidenav-dot   { background: var(--accent); border-color: var(--accent); transform: scale(1.3); }
    .sidenav-item.active .sidenav-dot  { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129,140,248,.2); }
    .sidenav-item.active .sidenav-label { color: var(--accent); }
    @media (max-width: 900px) { .sidenav { display: none; } }

    /* ── PANEL FLOTANTE ── */
    .state-panel-float {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: .65rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s;
      opacity: 0;
      pointer-events: none;
      max-width: 90vw;
    }
    .state-panel-float.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    .state-panel-float .panel-label {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-right: .35rem;
      white-space: nowrap;
    }

    /* ── HEADER ── */
    header {
      max-width: 960px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header span {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: .2rem .55rem;
      border-radius: 4px;
    }

    /* ── INPUT ── */
    .input-wrap {
      max-width: 960px;
      margin: 0 auto 2rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1.25rem;
    }
    .input-wrap label {
      display: block;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: .6rem;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 72px;
    }
    textarea::placeholder { color: var(--muted); }
    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: .9rem;
      margin-top: .75rem;
    }
    .hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTADO ── */
    #resultado { max-width: 960px; margin: 0 auto; display: none; }

    /* ── SECCIÓN ── */
    .seccion {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .seccion-header {
      padding: .85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .seccion-header > span:first-child {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
    }
    .seccion-body { padding: 1.25rem; }

    /* ── RESUMEN ── */
    .resumen-texto { color: #b0b4c0; font-size: .95rem; line-height: 1.65; margin-bottom: 1.1rem; }
    .expr-bloque { display: flex; flex-direction: column; gap: .75rem; }
    .expr-fila { display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap; }
    .expr-nombre { font-family: var(--mono); font-size: .85rem; color: var(--out-color); font-weight: 600; min-width: 36px; padding-top: .15rem; }
    .expr-detalles { display: flex; flex-direction: column; gap: .35rem; }
    .expr-linea { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .etiqueta { font-family: var(--mono); font-size: .68rem; color: var(--muted); min-width: 68px; text-transform: uppercase; letter-spacing: .05em; }
    .formula { font-family: var(--mono); font-size: .88rem; padding: .22rem .65rem; border-radius: 6px; }
    .formula-inferida { background: #1a1f2e; color: var(--accent);    border: 1px solid #2a3050; }
    .formula-canonica { background: #1a1a2e; color: #a78bfa;          border: 1px solid #3a2a60; }
    .formula-simple   { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .expr-desc { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

    /* ── VARIABLES ── */
    .vars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .var-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1rem 1.25rem; }
    .var-card h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .75rem; }
    .var-card.entradas h3 { color: var(--in-color); }
    .var-card.salidas  h3 { color: var(--out-color); }
    .badges { display: flex; flex-wrap: wrap; gap: .45rem; }
    .badge { font-family: var(--mono); font-size: .85rem; font-weight: 600; padding: .25rem .7rem; border-radius: 6px; }
    .badge-in  { background: #0c2a3a; color: var(--in-color);  border: 1px solid #1a4a5e; }
    .badge-out { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }

    /* ── TABLA DE VERDAD ── */
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); }
    thead tr { background: #12151d; }
    th { padding: .65rem 1rem; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; text-align: center; white-space: nowrap; }
    th.col-in  { color: var(--in-color);  border-bottom: 2px solid var(--in-color); }
    th.col-out { color: var(--out-color); border-bottom: 2px solid var(--out-color); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: .55rem 1rem; text-align: center; font-size: .92rem; }
    .sep-col { width: 2px; background: var(--border2); padding: 0; }
    td.val-1-in  { color: var(--in-color); }
    td.val-0-in  { color: #334455; }
    td.val-1-out { color: var(--out-color); font-weight: 600; }
    td.val-0-out { color: #2a3a2a; font-weight: 600; }
    td.col-out   { background: rgba(74,222,128,.03); }

    /* ── KARNAUGH ── */
    .karnaugh-wrap { display: flex; gap: 2.5rem; flex-wrap: wrap; align-items: flex-start; }
    .kmap-container { overflow-x: auto; }
    .kmap-table { border-collapse: separate; border-spacing: 4px; font-family: var(--mono); }
    .kmap-table th { background: transparent; border: none; color: var(--muted); font-size: .75rem; padding: .3rem .5rem; text-align: center; border-bottom: none; }
    .kmap-cell { width: 54px; height: 54px; text-align: center; vertical-align: middle; font-size: 1.1rem; font-weight: 600; border-radius: 8px; border: 2px solid var(--border2); background: var(--surface2); color: #334455; transition: all .2s; }
    .kmap-cell.val-1 { color: var(--text); background: #1a2030; }
    .kmap-cell.resaltado { border-width: 2px; }
    .kmap-corner { background: transparent !important; border: none !important; }
    .leyenda { display: flex; flex-direction: column; gap: .6rem; min-width: 170px; }
    .leyenda h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .15rem; }
    .leyenda-item { display: flex; align-items: flex-start; gap: .55rem; }
    .leyenda-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; margin-top: .18rem; }
    .leyenda-texto { font-family: var(--mono); font-size: .84rem; color: var(--text); }
    .leyenda-mints { font-size: .7rem; color: var(--muted); font-family: var(--mono); }

    /* ── QUINE ── */
    .qm-paso { margin-bottom: 1.5rem; }
    .qm-paso:last-child { margin-bottom: 0; }
    .qm-titulo { font-size: .9rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
    .qm-explicacion { font-size: .82rem; color: var(--muted); line-height: 1.65; margin-bottom: .85rem; padding-left: .85rem; border-left: 2px solid var(--border2); }
    .qm-tabla { overflow-x: auto; margin-top: .5rem; }
    .qm-tabla table { font-size: .82rem; }
    .qm-tabla th { color: var(--accent); border-bottom: 1px solid var(--border2); font-size: .72rem; }
    .qm-tabla td { color: #b0b4c0; border-bottom: 1px solid var(--border); padding: .45rem .85rem; }
    .qm-tabla tr:last-child td { border-bottom: none; }
    .qm-tabla td.termino { color: var(--out-color); font-weight: 600; }
    .qm-tabla td.binario { color: var(--in-color); }

    /* ── BADGES MÉTODO ── */
    .metodo-badge { font-family: var(--mono); font-size: .7rem; padding: .18rem .55rem; border-radius: 4px; font-weight: 600; }
    .metodo-kmap  { background: #1a2a1a; color: var(--out-color); border: 1px solid #2a4a2a; }
    .metodo-quine { background: #1a1a2e; color: var(--accent);    border: 1px solid #2a2a4e; }
    .salida-titulo { font-size: .88rem; font-weight: 700; color: var(--out-color); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .75rem; font-family: var(--mono); }
    .salida-titulo::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

    /* ── LADDER ── */
    .ladder-wrap { overflow-x: auto; }
    .ladder-hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); margin-bottom: 1rem; padding: .55rem .85rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
    .ladder-hint b { color: var(--in-color); }
    .state-panel { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .state-btn { font-family: var(--mono); font-size: .8rem; font-weight: 600; padding: .35rem .85rem; border-radius: 7px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: .4rem; }
    .state-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .18s; }
    .state-btn.on { border-color: var(--in-color); color: var(--in-color); background: #0c2a3a; }
    .state-btn.on .dot { background: var(--in-color); }
    .ladder-svg { display: block; }

    /* ── ERROR ── */
    .error-box { background: #1a0a0a; border: 1px solid #4a1a1a; border-radius: 12px; padding: 1rem 1.25rem; color: #f87171; font-family: var(--mono); font-size: .88rem; }

    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .vars-grid { grid-template-columns: 1fr; } .karnaugh-wrap { flex-direction: column; } }
  </style>
</head>
<body>

<!-- MENÚ LATERAL -->
<nav class="sidenav" id="sidenav">
  <div class="sidenav-item" onclick="irA('sec-analisis')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Análisis lógico</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-vars')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Variables</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-tabla')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Tabla de verdad</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-simplificacion')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Simplificación</span>
  </div>
  <div class="sidenav-item" onclick="irA('ladder-seccion')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Diagrama Ladder</span>
  </div>
</nav>

<header>
  <h1>Tabla de Verdad</h1>
  <span>Agente IA</span>
</header>

<div class="input-wrap">
  <label>Describe tu problema lógico</label>
  <textarea id="txt" placeholder="Ej: La alarma se activa si hay movimiento Y la puerta está abierta. La luz se enciende si hay movimiento O si la puerta está abierta y no hay luz."></textarea>
  <div class="input-footer">
    <span class="hint">Enter para enviar · Shift+Enter nueva línea</span>
    <button id="btn" onclick="enviar()"><span>Analizar</span></button>
  </div>
</div>

<div id="resultado"></div>

<!-- PANEL FLOTANTE -->
<div class="state-panel-float" id="state-panel-float">
  <span class="panel-label">Entradas</span>
</div>

<script>
/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
let ladderData  = null;
let inputStates = {};

const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const res = document.getElementById('resultado');

txt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

async function enviar() {
  const mensaje = txt.value.trim();
  if (!mensaje) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Analizando...</span>';
  res.style.display = 'none';
  ladderData  = null;
  inputStates = {};

  // Ocultar sidenav al iniciar nueva consulta
  document.getElementById('sidenav').classList.remove('visible');

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: mensaje })
    });
    if (!r.ok) throw new Error(`Error del servidor: ${r.status}`);
    const data = await r.json();

    if (data.error) {
      res.innerHTML = `<div class="error-box fade-in">⚠ ${data.error}</div>`;
    } else {
      data.entradas.forEach(v => { inputStates[v] = 0; });
      if (data.ladder) ladderData = data.ladder;
      res.innerHTML = renderizar(data);
      // Inicializar panel flotante con los botones correctos
      construirPanelFlotante(data.entradas);
      // Activar navegación
      setTimeout(() => {
        initSidenav();
        initFloatPanel();
      }, 100);
    }
    res.style.display = 'block';
  } catch(e) {
    res.innerHTML = `<div class="error-box fade-in">⚠ Error de conexión: ${e.message}</div>`;
    res.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = '<span>Analizar</span>';
}

/* ═══════════════════════════════════════
   RENDERIZADO PRINCIPAL
═══════════════════════════════════════ */
function renderizar(d) {
  return renderResumen(d)
       + renderVars(d)
       + renderTablaVerdad(d)
       + renderSimplificacion(d)
       + renderLadderSection(d);
}

/* ── RESUMEN ── */
function renderResumen(d) {
  const exprs = d.salidas.map(s => `
    <div class="expr-fila">
      <span class="expr-nombre">${s.nombre}</span>
      <div class="expr-detalles">
        <div class="expr-linea">
          <span class="etiqueta">inferida</span>
          <span class="formula formula-inferida">${s.expresion_display}</span>
        </div>
        <div class="expr-linea">
          <span class="etiqueta">canónica</span>
          <span class="formula formula-canonica">${s.expresion_canonica}</span>
        </div>
        <div class="expr-linea">
          <span class="etiqueta">simplif.</span>
          <span class="formula formula-simple">${s.expresion_simplificada}</span>
        </div>
        <div class="expr-desc">${s.descripcion}</div>
      </div>
    </div>`).join('');

  return `
    <div class="seccion fade-in" id="sec-analisis">
      <div class="seccion-header"><span>Análisis lógico</span></div>
      <div class="seccion-body">
        <p class="resumen-texto">${d.resumen}</p>
        <div class="expr-bloque">${exprs}</div>
      </div>
    </div>`;
}

/* ── VARIABLES ── */
function renderVars(d) {
  const bIn  = d.entradas.map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = d.salidas.map(s => `<span class="badge badge-out">${s.nombre}</span>`).join('');
  return `
    <div class="vars-grid fade-in" id="sec-vars">
      <div class="var-card entradas">
        <h3>Entradas (${d.entradas.length})</h3>
        <div class="badges">${bIn}</div>
      </div>
      <div class="var-card salidas">
        <h3>Salidas (${d.salidas.length})</h3>
        <div class="badges">${bOut}</div>
      </div>
    </div>`;
}

/* ── TABLA DE VERDAD ── */
function renderTablaVerdad(d) {
  const nombres = d.salidas.map(s => s.nombre);
  const thIn  = d.entradas.map(v => `<th class="col-in">${v}</th>`).join('');
  const thOut = nombres.map(n => `<th class="col-out">${n}</th>`).join('');
  const filas = d.tabla.map(fila => {
    const tdIn  = d.entradas.map(v =>
      `<td class="${fila[v]===1?'val-1-in':'val-0-in'}">${fila[v]}</td>`).join('');
    const tdOut = nombres.map(n =>
      `<td class="col-out ${fila[n]===1?'val-1-out':'val-0-out'}">${fila[n]===-1?'?':fila[n]}</td>`).join('');
    return `<tr>${tdIn}<td class="sep-col"></td>${tdOut}</tr>`;
  }).join('');

  return `
    <div class="seccion fade-in" id="sec-tabla">
      <div class="seccion-header">
        <span>Tabla de verdad</span>
        <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">
          ${d.tabla.length} filas · ${d.entradas.length + nombres.length} columnas
        </span>
      </div>
      <div class="tabla-scroll">
        <table>
          <thead><tr>${thIn}<th class="sep-col"></th>${thOut}</tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>
    </div>`;
}

/* ── SIMPLIFICACIÓN ── */
function renderSimplificacion(d) {
  return d.salidas.map((s, idx) => {
    const badge = s.metodo === 'karnaugh'
      ? '<span class="metodo-badge metodo-kmap">Mapa de Karnaugh</span>'
      : '<span class="metodo-badge metodo-quine">Quine-McCluskey</span>';
    const contenido = s.metodo === 'karnaugh' ? renderKarnaugh(s) : renderQuine(s);
    const secId = idx === 0 ? 'id="sec-simplificacion"' : '';
    return `
      <div class="seccion fade-in" ${secId}>
        <div class="seccion-header">
          <span>Simplificación — ${s.nombre}</span>${badge}
        </div>
        <div class="seccion-body">
          <div class="salida-titulo">${s.nombre} = ${s.expresion_simplificada}</div>
          ${contenido}
        </div>
      </div>`;
  }).join('');
}

/* ── LADDER ── */
function renderLadderSection(d) {
  if (!d.ladder || !d.ladder.salidas || d.ladder.salidas.length === 0) return '';

  const botones = d.entradas.map(v => `
    <button class="state-btn" id="sbtn-${v}" onclick="toggleInput('${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');

  return `
    <div class="seccion fade-in" id="ladder-seccion">
      <div class="seccion-header">
        <span>Diagrama Ladder</span>
        <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">interactivo</span>
      </div>
      <div class="seccion-body">
        <div class="ladder-hint">
          <b>Haz clic</b> en los botones de entrada para activar/desactivar · Los contactos y bobinas se actualizan en tiempo real
        </div>
        <div class="state-panel" id="state-panel-inline">${botones}</div>
        <div class="ladder-wrap" id="ladder-svg-wrap">
          ${dibujarLadder(d.ladder, d.entradas)}
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   KARNAUGH
═══════════════════════════════════════ */
function renderKarnaugh(s) {
  const k = s.karnaugh;
  if (!k || !k.mapa || k.mapa.length === 0) {
    const msg = s.expresion_simplificada === '0'
      ? 'La salida siempre es 0 — no hay mintérminos.'
      : 'La salida siempre es 1 — todos los mintérminos activos.';
    return `<p style="color:var(--muted);font-size:.88rem">${msg}</p>`;
  }
  const minterms   = new Set(k.minterms || []);
  const grupos     = k.grupos || [];
  const colLabels  = k.col_labels || [];
  const filLabels  = k.fila_labels || [];
  const celdaColor = {};
  grupos.forEach(g => g.celdas.forEach(c => { if (!celdaColor[c]) celdaColor[c] = g.color; }));

  let thead = '<tr><th class="kmap-corner"> </th>';
  colLabels.forEach(cl => { thead += `<th>${cl}</th>`; });
  thead += '</tr>';

  let tbody = '';
  k.mapa.forEach((fila, ri) => {
    tbody += `<tr><th>${filLabels[ri] || ''}</th>`;
    fila.forEach(idx => {
      const val    = minterms.has(idx) ? 1 : 0;
      const color  = celdaColor[idx] || null;
      const estilo = color ? `border-color:${color};box-shadow:0 0 0 2px ${color}33;background:${color}15;` : '';
      tbody += `<td class="kmap-cell${val===1?' val-1':''}${color?' resaltado':''}" style="${estilo}" title="m${idx}">${val}</td>`;
    });
    tbody += '</tr>';
  });

  const items = grupos.map(g => `
    <div class="leyenda-item">
      <div class="leyenda-dot" style="background:${g.color}"></div>
      <div>
        <div class="leyenda-texto">${g.termino}</div>
        <div class="leyenda-mints">m(${g.celdas.join(', ')})</div>
      </div>
    </div>`).join('');

  return `
    <div class="karnaugh-wrap">
      <div class="kmap-container">
        <table class="kmap-table">
          <thead>${thead}</thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      <div class="leyenda">
        <h4>Grupos identificados</h4>
        ${items || '<span style="color:var(--muted);font-size:.8rem">Sin grupos</span>'}
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   QUINE-McCLUSKEY
═══════════════════════════════════════ */
function renderQuine(s) {
  if (!s.quine_pasos || s.quine_pasos.length === 0)
    return `<p style="color:var(--muted);font-size:.88rem">Sin pasos disponibles.</p>`;

  const sep = '<hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0">';
  return s.quine_pasos.map(paso => {
    let tablaHtml = '';
    if (paso.tipo === 'tabla_minterms') {
      const filas = paso.filas.map(f =>
        `<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td style="text-align:center">${f.unos}</td></tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);
    } else if (paso.tipo === 'tabla_combinaciones') {
      const filas = paso.filas.map(f =>
        `<tr><td>${f.combinacion}</td><td class="binario">${f.resultado}</td><td class="termino">${f.termino}</td></tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);
    } else if (paso.tipo === 'tabla_implicantes') {
      const filas = paso.filas.map(f =>
        `<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td class="termino">${f.termino}</td></tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);
    }
    return `
      <div class="qm-paso">
        <div class="qm-titulo">${paso.titulo}</div>
        <div class="qm-explicacion">${paso.explicacion}</div>
        ${tablaHtml}
      </div>`;
  }).join(sep);
}

function buildQmTable(columnas, filas) {
  return `<div class="qm-tabla"><table>
    <thead><tr>${columnas.map(c => `<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${filas}</tbody>
  </table></div>`;
}

/* ═══════════════════════════════════════
   LADDER SVG
═══════════════════════════════════════ */
function toggleInput(v) {
  inputStates[v] = inputStates[v] === 1 ? 0 : 1;
  // Sincronizar botón inline y flotante
  ['sbtn', 'sbtn-float'].forEach(prefix => {
    const b = document.getElementById(`${prefix}-${v}`);
    if (b) b.classList.toggle('on', inputStates[v] === 1);
  });
  // Redibujar SVG
  const wrap = document.getElementById('ladder-svg-wrap');
  if (wrap && ladderData) {
    wrap.innerHTML = dibujarLadder(ladderData, Object.keys(inputStates));
  }
}

function dibujarLadder(ladder, entradas) {
  const salidas = ladder.salidas;
  const RAIL_LEFT         = 30;
  const RAIL_RIGHT_OFFSET = 120;
  const ROW_H             = 70;
  const CONTACT_W         = 55;
  const CONTACT_H         = 28;
  const COIL_R            = 18;
  const PAD_TOP           = 30;
  const PAD_BOT           = 30;

  let maxContactos = 0;
  salidas.forEach(s => s.escalones.forEach(esc => {
    if (esc.contactos.length > maxContactos) maxContactos = esc.contactos.length;
  }));

  const AREA_W     = Math.max(420, maxContactos * (CONTACT_W + 16) + 80);
  const RAIL_RIGHT = RAIL_LEFT + AREA_W;

  let totalFilas = 0;
  salidas.forEach(s => { totalFilas += s.escalones.length; });
  totalFilas += Math.max(0, salidas.length - 1);

  const svgH = PAD_TOP + totalFilas * ROW_H + PAD_BOT;
  const svgW = RAIL_RIGHT + RAIL_RIGHT_OFFSET + 20;

  const C_RAIL    = '#2e323d';
  const C_ACTIVE  = '#4ade80';
  const C_INACTIVE= '#2e323d';
  const C_TEXT    = '#e8eaf0';
  const C_MUTED   = '#6b7080';
  const C_NC      = '#38bdf8';
  const C_BG      = '#161920';

  let els = [];

  // Rieles verticales
  els.push(`<line x1="${RAIL_LEFT}" y1="${PAD_TOP-10}" x2="${RAIL_LEFT}" y2="${svgH-PAD_BOT+10}" stroke="${C_RAIL}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<line x1="${RAIL_RIGHT}" y1="${PAD_TOP-10}" x2="${RAIL_RIGHT}" y2="${svgH-PAD_BOT+10}" stroke="${C_RAIL}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<text x="${RAIL_LEFT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${C_MUTED}">L+</text>`);
  els.push(`<text x="${RAIL_RIGHT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${C_MUTED}">L-</text>`);

  let currentY = PAD_TOP;
  let primera  = true;

  salidas.forEach(salida => {
    if (!primera) {
      els.push(`<line x1="${RAIL_LEFT+10}" y1="${currentY-10}" x2="${RAIL_RIGHT-10}" y2="${currentY-10}" stroke="${C_RAIL}" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>`);
    }
    primera = false;

    const numEsc    = salida.escalones.length;
    const bloqueH   = numEsc * ROW_H;
    const bloqueMidY = currentY + bloqueH / 2;
    const bobinaActiva = salida.escalones.some(esc =>
      esc.contactos.every(ct => {
        const val = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        return ct.negado ? val === 0 : val === 1;
      })
    );

    // Barra izquierda paralela
    if (numEsc > 1) {
      const y1 = currentY + ROW_H / 2;
      const y2 = currentY + bloqueH - ROW_H / 2;
      els.push(`<line x1="${RAIL_LEFT+4}" y1="${y1}" x2="${RAIL_LEFT+4}" y2="${y2}" stroke="${C_INACTIVE}" stroke-width="2.5"/>`);
    }

    salida.escalones.forEach((esc, ei) => {
      const midY = currentY + ei * ROW_H + ROW_H / 2;
      const escActivo = esc.contactos.every(ct => {
        const val = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        return ct.negado ? val === 0 : val === 1;
      });
      const wireColor = escActivo ? C_ACTIVE : C_INACTIVE;

      // Línea desde riel al primer contacto
      els.push(`<line x1="${RAIL_LEFT+4}" y1="${midY}" x2="${RAIL_LEFT+30}" y2="${midY}" stroke="${wireColor}" stroke-width="2.5"/>`);

      let xCursor = RAIL_LEFT + 30;

      esc.contactos.forEach((ct, ci) => {
        const val      = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        const ctActivo = ct.negado ? val === 0 : val === 1;
        const ctColor  = ctActivo ? C_ACTIVE : C_INACTIVE;
        const lblColor = ct.negado ? C_NC : C_TEXT;

        // Separador entre contactos
        if (ci > 0) {
          els.push(`<line x1="${xCursor}" y1="${midY}" x2="${xCursor+10}" y2="${midY}" stroke="${ctColor}" stroke-width="2.5"/>`);
          xCursor += 10;
        }

        const cx = xCursor + CONTACT_W / 2;

        // Líneas verticales del contacto
        els.push(`<line x1="${cx-10}" y1="${midY-CONTACT_H/2}" x2="${cx-10}" y2="${midY+CONTACT_H/2}" stroke="${ctColor}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx+10}" y1="${midY-CONTACT_H/2}" x2="${cx+10}" y2="${midY+CONTACT_H/2}" stroke="${ctColor}" stroke-width="2.5"/>`);
        // Línea horizontal de paso
        els.push(`<line x1="${cx-10}" y1="${midY}" x2="${cx+10}" y2="${midY}" stroke="${ctColor}" stroke-width="2.5"/>`);

        // Diagonal para NC
        if (ct.negado) {
          els.push(`<line x1="${cx-8}" y1="${midY+CONTACT_H/2-4}" x2="${cx+8}" y2="${midY-CONTACT_H/2+4}" stroke="${ctColor}" stroke-width="2"/>`);
        }

        // Etiqueta
        const label = ct.negado ? `${ct.var}'` : ct.var;
        els.push(`<text x="${cx}" y="${midY-CONTACT_H/2-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${lblColor}">${label}</text>`);

        xCursor += CONTACT_W;
      });

      // Línea al riel derecho
      els.push(`<line x1="${xCursor}" y1="${midY}" x2="${RAIL_RIGHT-4}" y2="${midY}" stroke="${wireColor}" stroke-width="2.5"/>`);
    });

    // Barra derecha paralela
    if (numEsc > 1) {
      const y1 = currentY + ROW_H / 2;
      const y2 = currentY + bloqueH - ROW_H / 2;
      els.push(`<line x1="${RAIL_RIGHT-4}" y1="${y1}" x2="${RAIL_RIGHT-4}" y2="${y2}" stroke="${C_INACTIVE}" stroke-width="2.5"/>`);
    }

    // Línea a bobina
    const bobColor  = bobinaActiva ? C_ACTIVE : C_INACTIVE;
    const coilX     = RAIL_RIGHT + 40;
    els.push(`<line x1="${RAIL_RIGHT-4}" y1="${bloqueMidY}" x2="${coilX-COIL_R}" y2="${bloqueMidY}" stroke="${bobColor}" stroke-width="2.5"/>`);

    // Bobina
    const coilFill   = bobinaActiva ? '#0c2a1a' : '#12151d';
    const coilStroke = bobinaActiva ? C_ACTIVE  : '#2e323d';
    els.push(`<circle cx="${coilX}" cy="${bloqueMidY}" r="${COIL_R}" fill="${coilFill}" stroke="${coilStroke}" stroke-width="2.5"/>`);
    els.push(`<text x="${coilX}" y="${bloqueMidY+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="${bobinaActiva ? C_ACTIVE : C_MUTED}">( )</text>`);
    els.push(`<text x="${coilX}" y="${bloqueMidY-COIL_R-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${bobinaActiva ? C_ACTIVE : C_MUTED}">${salida.nombre}</text>`);

    // Línea bobina → riel derecho
    els.push(`<line x1="${coilX+COIL_R}" y1="${bloqueMidY}" x2="${RAIL_RIGHT+RAIL_RIGHT_OFFSET-10}" y2="${bloqueMidY}" stroke="${bobColor}" stroke-width="2.5"/>`);

    currentY += numEsc * ROW_H;
  });

  return `<svg class="ladder-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${svgW}" height="${svgH}" fill="${C_BG}" rx="10"/>
    ${els.join('\n')}
  </svg>`;
}

/* ═══════════════════════════════════════
   PANEL FLOTANTE
═══════════════════════════════════════ */
function construirPanelFlotante(entradas) {
  const panel = document.getElementById('state-panel-float');
  const label = panel.querySelector('.panel-label');
  // Limpiar botones anteriores (mantener solo el label)
  panel.innerHTML = '<span class="panel-label">Entradas</span>';
  entradas.forEach(v => {
    const b = document.createElement('button');
    b.className = 'state-btn';
    b.id = `sbtn-float-${v}`;
    b.onclick = () => toggleInput(v);
    b.innerHTML = `<span class="dot"></span>${v}`;
    panel.appendChild(b);
  });
}

function initFloatPanel() {
  const seccion    = document.getElementById('ladder-seccion');
  const panelInline = document.getElementById('state-panel-inline');
  const panelFloat  = document.getElementById('state-panel-float');
  if (!seccion || !panelFloat || !panelInline) return;

  function actualizar() {
    const secRect    = seccion.getBoundingClientRect();
    const inlineRect = panelInline.getBoundingClientRect();
    const secVisible    = secRect.bottom > 0 && secRect.top < window.innerHeight;
    const inlineVisible = inlineRect.bottom > 80 && inlineRect.top < window.innerHeight;
    panelFloat.classList.toggle('visible', secVisible && !inlineVisible);
  }

  window.addEventListener('scroll', actualizar, { passive: true });
  actualizar();
}

/* ═══════════════════════════════════════
   MENÚ LATERAL
═══════════════════════════════════════ */
function irA(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function initSidenav() {
  const nav = document.getElementById('sidenav');
  if (!nav) return;
  nav.classList.add('visible');

  const ids   = ['sec-analisis', 'sec-vars', 'sec-tabla', 'sec-simplificacion', 'ladder-seccion'];
  const items = nav.querySelectorAll('.sidenav-item');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const idx = ids.indexOf(entry.target.id);
      if (idx !== -1) items[idx]?.classList.toggle('active', entry.isIntersecting);
    });
  }, { threshold: 0.25 });

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });
}
</script>
