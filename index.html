<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGENTE IA — by: kingAnthony</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #161920;
      --surface2: #1c202b;
      --border:   #252830;
      --border2:  #2e323d;
      --text:     #e8eaf0;
      --muted:    #6b7080;
      --in-color: #38bdf8;
      --out-color:#4ade80;
      --accent:   #818cf8;
      --accent2:  #c084fc;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── HEADER ── */
    header {
      max-width: 900px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header span {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: .2rem .55rem;
      border-radius: 4px;
    }

    /* ── INPUT ── */
    .input-wrap {
      max-width: 900px;
      margin: 0 auto 2rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1.25rem;
    }
    .input-wrap label {
      display: block;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: .6rem;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 72px;
    }
    textarea::placeholder { color: var(--muted); }
    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: .9rem;
      margin-top: .75rem;
    }
    .hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTADO ── */
    #resultado { max-width: 900px; margin: 0 auto; display: none; }

    /* ── SECCIÓN GENÉRICA ── */
    .seccion {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .seccion-header {
      padding: .85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .seccion-header > span:first-child {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
    }
    .seccion-body { padding: 1.25rem; }

    /* ── RESUMEN ── */
    .resumen-texto {
      color: #b0b4c0;
      font-size: .95rem;
      line-height: 1.65;
      margin-bottom: 1.1rem;
    }
    .expr-bloque { display: flex; flex-direction: column; gap: .75rem; }
    .expr-fila {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .expr-nombre {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--out-color);
      font-weight: 600;
      min-width: 36px;
      padding-top: .15rem;
    }
    .expr-detalles { display: flex; flex-direction: column; gap: .35rem; }
    .expr-linea {
      display: flex;
      align-items: center;
      gap: .55rem;
      flex-wrap: wrap;
    }
    .etiqueta {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      min-width: 68px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .formula {
      font-family: var(--mono);
      font-size: .88rem;
      padding: .22rem .65rem;
      border-radius: 6px;
    }
    .formula-inferida { background: #1a1f2e; color: var(--accent);   border: 1px solid #2a3050; }
    .formula-canonica { background: #1a1a2e; color: #a78bfa;         border: 1px solid #3a2a60; }
    .formula-simple   { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .expr-desc { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

    /* ── VARIABLES ── */
    .vars-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .var-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1rem 1.25rem;
    }
    .var-card h3 {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .75rem;
    }
    .var-card.entradas h3 { color: var(--in-color); }
    .var-card.salidas  h3 { color: var(--out-color); }
    .badges { display: flex; flex-wrap: wrap; gap: .45rem; }
    .badge {
      font-family: var(--mono);
      font-size: .85rem;
      font-weight: 600;
      padding: .25rem .7rem;
      border-radius: 6px;
    }
    .badge-in  { background: #0c2a3a; color: var(--in-color);  border: 1px solid #1a4a5e; }
    .badge-out { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }

    /* ── TABLA DE VERDAD ── */
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); }
    thead tr { background: #12151d; }
    th {
      padding: .65rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align: center;
      white-space: nowrap;
    }
    th.col-in  { color: var(--in-color);  border-bottom: 2px solid var(--in-color); }
    th.col-out { color: var(--out-color); border-bottom: 2px solid var(--out-color); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: .55rem 1rem; text-align: center; font-size: .92rem; }
    .sep-col { width: 2px; background: var(--border2); padding: 0; }
    td.val-1-in  { color: var(--in-color); }
    td.val-0-in  { color: #334455; }
    td.val-1-out { color: var(--out-color); font-weight: 600; }
    td.val-0-out { color: #2a3a2a; font-weight: 600; }
    td.col-out   { background: rgba(74,222,128,.03); }

    /* ── KARNAUGH ── */
    .karnaugh-wrap {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .kmap-container { overflow-x: auto; }
    .kmap-table {
      border-collapse: separate;
      border-spacing: 4px;
      font-family: var(--mono);
    }
    .kmap-table th {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: .75rem;
      padding: .3rem .5rem;
      text-align: center;
      border-bottom: none;
      letter-spacing: .04em;
    }
    .kmap-cell {
      width: 54px;
      height: 54px;
      text-align: center;
      vertical-align: middle;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      border: 2px solid var(--border2);
      background: var(--surface2);
      color: #334455;
      position: relative;
      transition: all .2s;
    }
    .kmap-cell.val-1 { color: var(--text); background: #1a2030; }
    .kmap-cell.resaltado { border-width: 2px; }
    .kmap-corner { background: transparent !important; border: none !important; }

    /* ── LEYENDA KARNAUGH ── */
    .leyenda { display: flex; flex-direction: column; gap: .6rem; min-width: 170px; }
    .leyenda h4 {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: .15rem;
    }
    .leyenda-item { display: flex; align-items: flex-start; gap: .55rem; }
    .leyenda-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: .18rem;
    }
    .leyenda-texto { font-family: var(--mono); font-size: .84rem; color: var(--text); }
    .leyenda-mints { font-size: .7rem; color: var(--muted); font-family: var(--mono); }

    /* ── QUINE-McCLUSKEY ── */
    .qm-paso { margin-bottom: 1.5rem; }
    .qm-paso:last-child { margin-bottom: 0; }
    .qm-titulo { font-size: .9rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
    .qm-explicacion {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: .85rem;
      padding-left: .85rem;
      border-left: 2px solid var(--border2);
    }
    .qm-tabla { overflow-x: auto; margin-top: .5rem; }
    .qm-tabla table { font-size: .82rem; }
    .qm-tabla th { color: var(--accent); border-bottom: 1px solid var(--border2); font-size: .72rem; }
    .qm-tabla td { color: #b0b4c0; border-bottom: 1px solid var(--border); padding: .45rem .85rem; }
    .qm-tabla tr:last-child td { border-bottom: none; }
    .qm-tabla td.termino { color: var(--out-color); font-weight: 600; }
    .qm-tabla td.binario { color: var(--in-color); }

    /* ── BADGE MÉTODO ── */
    .metodo-badge {
      font-family: var(--mono);
      font-size: .7rem;
      padding: .18rem .55rem;
      border-radius: 4px;
      font-weight: 600;
    }
    .metodo-kmap  { background: #1a2a1a; color: var(--out-color); border: 1px solid #2a4a2a; }
    .metodo-quine { background: #1a1a2e; color: var(--accent);    border: 1px solid #2a2a4e; }

    .salida-titulo {
      font-size: .88rem;
      font-weight: 700;
      color: var(--out-color);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      font-family: var(--mono);
    }
    .salida-titulo::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* ── ERROR ── */
    .error-box {
      background: #1a0a0a;
      border: 1px solid #4a1a1a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: #f87171;
      font-family: var(--mono);
      font-size: .88rem;
    }

    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .vars-grid { grid-template-columns: 1fr; }
      .karnaugh-wrap { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>Agente IA</h1>
  <span>by: kingAnthony
  </span>
</header>

<div class="input-wrap">
  <label>Describe tu problema lógico</label>
  <textarea id="txt" placeholder="Ej: La alarma se activa si hay movimiento Y la puerta está abierta. La luz de emergencia se enciende si hay movimiento O si la puerta está abierta y no hay luz."></textarea>
  <div class="input-footer">
    <span class="hint">Enter para enviar · Shift+Enter nueva línea</span>
    <button id="btn" onclick="enviar()"><span>Analizar</span></button>
  </div>
</div>

<div id="resultado"></div>

<script>
const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const res = document.getElementById('resultado');

txt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

async function enviar() {
  const mensaje = txt.value.trim();
  if (!mensaje) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Analizando...</span>';
  res.style.display = 'none';

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: mensaje })
    });
    if (!r.ok) throw new Error(`Error del servidor: ${r.status}`);
    const data = await r.json();
    res.innerHTML = data.error
      ? `<div class="error-box fade-in">⚠ ${data.error}</div>`
      : renderizar(data);
    res.style.display = 'block';
  } catch(e) {
    res.innerHTML = `<div class="error-box fade-in">⚠ Error de conexión: ${e.message}</div>`;
    res.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = '<span>Analizar</span>';
}

/* ═══════════════════════════════════
   RENDERIZADO PRINCIPAL
═══════════════════════════════════ */
function renderizar(d) {
  return renderResumen(d)
       + renderVars(d)
       + renderTablaVerdad(d)
       + renderSimplificacion(d);
}

/* ── RESUMEN ── */
function renderResumen(d) {
  const exprs = d.salidas.map(s => `
    <div class="expr-fila">
      <span class="expr-nombre">${s.nombre}</span>
      <div class="expr-detalles">
        <div class="expr-linea">
          <span class="etiqueta">inferida</span>
          <span class="formula formula-inferida">${s.expresion_display}</span>
        </div>
        <div class="expr-linea">
          <span class="etiqueta">canónica</span>
          <span class="formula formula-canonica">${s.expresion_canonica}</span>
        </div>
        <div class="expr-linea">
          <span class="etiqueta">simplif.</span>
          <span class="formula formula-simple">${s.expresion_simplificada}</span>
        </div>
        <div class="expr-desc">${s.descripcion}</div>
      </div>
    </div>`).join('');

  return `
    <div class="seccion fade-in">
      <div class="seccion-header"><span>Análisis lógico</span></div>
      <div class="seccion-body">
        <p class="resumen-texto">${d.resumen}</p>
        <div class="expr-bloque">${exprs}</div>
      </div>
    </div>`;
}

/* ── VARIABLES ── */
function renderVars(d) {
  const bIn  = d.entradas.map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = d.salidas.map(s => `<span class="badge badge-out">${s.nombre}</span>`).join('');
  return `
    <div class="vars-grid fade-in">
      <div class="var-card entradas">
        <h3>Entradas (${d.entradas.length})</h3>
        <div class="badges">${bIn}</div>
      </div>
      <div class="var-card salidas">
        <h3>Salidas (${d.salidas.length})</h3>
        <div class="badges">${bOut}</div>
      </div>
    </div>`;
}

/* ── TABLA DE VERDAD ── */
function renderTablaVerdad(d) {
  const nombres = d.salidas.map(s => s.nombre);
  const thIn  = d.entradas.map(v => `<th class="col-in">${v}</th>`).join('');
  const thOut = nombres.map(n => `<th class="col-out">${n}</th>`).join('');
  const filas = d.tabla.map(fila => {
    const tdIn  = d.entradas.map(v =>
      `<td class="${fila[v]===1?'val-1-in':'val-0-in'}">${fila[v]}</td>`).join('');
    const tdOut = nombres.map(n =>
      `<td class="col-out ${fila[n]===1?'val-1-out':'val-0-out'}">${fila[n]===-1?'?':fila[n]}</td>`).join('');
    return `<tr>${tdIn}<td class="sep-col"></td>${tdOut}</tr>`;
  }).join('');

  return `
    <div class="seccion fade-in">
      <div class="seccion-header">
        <span>Tabla de verdad</span>
        <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">
          ${d.tabla.length} filas · ${d.entradas.length + nombres.length} columnas
        </span>
      </div>
      <div class="tabla-scroll">
        <table>
          <thead><tr>${thIn}<th class="sep-col"></th>${thOut}</tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>
    </div>`;
}

/* ── SIMPLIFICACIÓN ── */
function renderSimplificacion(d) {
  return d.salidas.map(s => {
    const badge = s.metodo === 'karnaugh'
      ? '<span class="metodo-badge metodo-kmap">Mapa de Karnaugh</span>'
      : '<span class="metodo-badge metodo-quine">Quine-McCluskey</span>';

    const contenido = s.metodo === 'karnaugh'
      ? renderKarnaugh(s)
      : renderQuine(s);

    return `
      <div class="seccion fade-in">
        <div class="seccion-header">
          <span>Simplificación — ${s.nombre}</span>
          ${badge}
        </div>
        <div class="seccion-body">
          <div class="salida-titulo">${s.nombre} = ${s.expresion_simplificada}</div>
          ${contenido}
        </div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════
   KARNAUGH
═══════════════════════════════════ */
function renderKarnaugh(s) {
  const k = s.karnaugh;
  if (!k || !k.mapa || k.mapa.length === 0) {
    const msg = s.expresion_simplificada === '0'
      ? 'La salida siempre es 0 — no hay mintérminos.'
      : 'La salida siempre es 1 — todos los mintérminos activos.';
    return `<p style="color:var(--muted);font-size:.88rem">${msg}</p>`;
  }

  const mapa      = k.mapa;
  const minterms  = new Set(k.minterms || []);
  const grupos    = k.grupos || [];
  const colLabels = k.col_labels || [];
  const filLabels = k.fila_labels || [];

  // Mapear celda → primer color de grupo
  const celdaColor = {};
  grupos.forEach(g => {
    g.celdas.forEach(c => {
      if (!celdaColor[c]) celdaColor[c] = g.color;
    });
  });

  // Encabezado columnas
  let thead = '<tr><th class="kmap-corner"> </th>';
  colLabels.forEach(cl => { thead += `<th>${cl}</th>`; });
  thead += '</tr>';

  // Filas
  let tbody = '';
  mapa.forEach((fila, ri) => {
    tbody += `<tr><th>${filLabels[ri] || ''}</th>`;
    fila.forEach(idx => {
      const val   = minterms.has(idx) ? 1 : 0;
      const color = celdaColor[idx] || null;
      const estilo = color
        ? `border-color:${color}; box-shadow:0 0 0 2px ${color}33; background:${color}15;`
        : '';
      const cls = `kmap-cell${val===1?' val-1':''}${color?' resaltado':''}`;
      tbody += `<td class="${cls}" style="${estilo}" title="m${idx}">${val}</td>`;
    });
    tbody += '</tr>';
  });

  // Leyenda
  const items = grupos.map(g => `
    <div class="leyenda-item">
      <div class="leyenda-dot" style="background:${g.color}"></div>
      <div>
        <div class="leyenda-texto">${g.termino}</div>
        <div class="leyenda-mints">m(${g.celdas.join(', ')})</div>
      </div>
    </div>`).join('');

  return `
    <div class="karnaugh-wrap">
      <div class="kmap-container">
        <table class="kmap-table">
          <thead>${thead}</thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      <div class="leyenda">
        <h4>Grupos identificados</h4>
        ${items || '<span style="color:var(--muted);font-size:.8rem">Sin grupos</span>'}
      </div>
    </div>`;
}

/* ═══════════════════════════════════
   QUINE-McCLUSKEY
═══════════════════════════════════ */
function renderQuine(s) {
  if (!s.quine_pasos || s.quine_pasos.length === 0)
    return `<p style="color:var(--muted);font-size:.88rem">Sin pasos disponibles.</p>`;

  const separador = '<hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0">';

  return s.quine_pasos.map((paso, i) => {
    let tablaHtml = '';

    if (paso.tipo === 'tabla_minterms') {
      const filas = paso.filas.map(f => `
        <tr>
          <td>${f.minterms.join(', ')}</td>
          <td class="binario">${f.binario}</td>
          <td style="text-align:center">${f.unos}</td>
        </tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);

    } else if (paso.tipo === 'tabla_combinaciones') {
      const filas = paso.filas.map(f => `
        <tr>
          <td>${f.combinacion}</td>
          <td class="binario">${f.resultado}</td>
          <td class="termino">${f.termino}</td>
        </tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);

    } else if (paso.tipo === 'tabla_implicantes') {
      const filas = paso.filas.map(f => `
        <tr>
          <td>${f.minterms.join(', ')}</td>
          <td class="binario">${f.binario}</td>
          <td class="termino">${f.termino}</td>
        </tr>`).join('');
      tablaHtml = buildQmTable(paso.columnas, filas);
    }

    return `
      <div class="qm-paso">
        <div class="qm-titulo">${paso.titulo}</div>
        <div class="qm-explicacion">${paso.explicacion}</div>
        ${tablaHtml}
      </div>`;
  }).join(separador);
}

function buildQmTable(columnas, filas) {
  const ths = columnas.map(c => `<th>${c}</th>`).join('');
  return `
    <div class="qm-tabla">
      <table>
        <thead><tr>${ths}</tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
