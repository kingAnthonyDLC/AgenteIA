<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Verdad — Agente IA</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1c202b;
      --border:    #252830;
      --border2:   #2e323d;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --in-color:  #38bdf8;
      --out-color: #4ade80;
      --accent:    #818cf8;
      --accent2:   #c084fc;
      --ton-color: #fb923c;
      --tof-color: #f472b6;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 2.5rem 1.5rem 5rem; }

    /* ── MENÚ LATERAL ── */
    .sidenav { position: fixed; left: 1.25rem; top: 50%; transform: translateY(-50%); z-index: 200; display: flex; flex-direction: column; gap: .6rem; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .sidenav.visible { opacity: 1; pointer-events: all; }
    .sidenav-item { display: flex; align-items: center; gap: .6rem; cursor: pointer; }
    .sidenav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); border: 2px solid var(--border2); transition: all .2s; flex-shrink: 0; }
    .sidenav-label { font-family: var(--mono); font-size: .72rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border2); padding: .2rem .6rem; border-radius: 5px; white-space: nowrap; opacity: 0; transform: translateX(-6px); transition: opacity .2s, transform .2s; pointer-events: none; }
    .sidenav-item:hover .sidenav-label { opacity: 1; transform: translateX(0); }
    .sidenav-item:hover .sidenav-dot   { background: var(--accent); border-color: var(--accent); transform: scale(1.3); }
    .sidenav-item.active .sidenav-dot  { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129,140,248,.2); }
    .sidenav-item.active .sidenav-label { color: var(--accent); }
    @media (max-width: 900px) { .sidenav { display: none; } }

    /* ── PANEL FLOTANTE ── */
    .state-panel-float { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120px); z-index: 100; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: .65rem 1rem; display: flex; flex-wrap: wrap; gap: .45rem; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,.5); transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s; opacity: 0; pointer-events: none; max-width: 90vw; }
    .state-panel-float.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    .state-panel-float .panel-label { font-family: var(--mono); font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-right: .35rem; white-space: nowrap; }

    /* ── HEADER ── */
    header { max-width: 960px; margin: 0 auto 2.5rem; display: flex; align-items: baseline; gap: 1rem; }
    header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header span { font-family: var(--mono); font-size: .75rem; color: var(--muted); border: 1px solid var(--border2); padding: .2rem .55rem; border-radius: 4px; }

    /* ── INPUT ── */
    .input-wrap { max-width: 960px; margin: 0 auto 2rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1.25rem; }
    .input-wrap label { display: block; font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .6rem; }
    textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: var(--sans); font-size: 1rem; line-height: 1.6; min-height: 72px; }
    textarea::placeholder { color: var(--muted); }
    .input-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: .9rem; margin-top: .75rem; }
    .hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); }
    button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: .6rem 1.4rem; border-radius: 8px; font-family: var(--sans); font-size: .9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: .5rem; transition: opacity .2s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTADO ── */
    #resultado { max-width: 960px; margin: 0 auto; display: none; }

    /* ── SECCIÓN ── */
    .seccion { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; margin-bottom: 1.25rem; overflow: hidden; }
    .seccion-header { padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .seccion-header > span:first-child { font-size: .75rem; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); }
    .seccion-body { padding: 1.25rem; }

    /* ── RESUMEN ── */
    .resumen-texto { color: #b0b4c0; font-size: .95rem; line-height: 1.65; margin-bottom: 1.1rem; }
    .expr-bloque { display: flex; flex-direction: column; gap: .75rem; }
    .expr-fila { display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap; }
    .expr-nombre { font-family: var(--mono); font-size: .85rem; color: var(--out-color); font-weight: 600; min-width: 36px; padding-top: .15rem; }
    .expr-detalles { display: flex; flex-direction: column; gap: .35rem; }
    .expr-linea { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .etiqueta { font-family: var(--mono); font-size: .68rem; color: var(--muted); min-width: 68px; text-transform: uppercase; letter-spacing: .05em; }
    .formula { font-family: var(--mono); font-size: .88rem; padding: .22rem .65rem; border-radius: 6px; }
    .formula-inferida { background: #1a1f2e; color: var(--accent);    border: 1px solid #2a3050; }
    .formula-canonica { background: #1a1a2e; color: #a78bfa;          border: 1px solid #3a2a60; }
    .formula-simple   { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .expr-desc { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

    /* ── VARIABLES ── */
    .vars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .var-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1rem 1.25rem; }
    .var-card h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .75rem; }
    .var-card.entradas h3 { color: var(--in-color); }
    .var-card.salidas  h3 { color: var(--out-color); }
    .badges { display: flex; flex-wrap: wrap; gap: .45rem; }
    .badge { font-family: var(--mono); font-size: .85rem; font-weight: 600; padding: .25rem .7rem; border-radius: 6px; }
    .badge-in  { background: #0c2a3a; color: var(--in-color);  border: 1px solid #1a4a5e; }
    .badge-out { background: #0c2a1a; color: var(--out-color); border: 1px solid #1a4a2a; }
    .badge-ton { background: #2a1500; color: var(--ton-color); border: 1px solid #4a2500; }
    .badge-tof { background: #2a0a1a; color: var(--tof-color); border: 1px solid #4a1a2a; }

    /* ── TABLA DE VERDAD ── */
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); }
    thead tr { background: #12151d; }
    th { padding: .65rem 1rem; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; text-align: center; white-space: nowrap; }
    th.col-in  { color: var(--in-color);  border-bottom: 2px solid var(--in-color); }
    th.col-out { color: var(--out-color); border-bottom: 2px solid var(--out-color); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: .55rem 1rem; text-align: center; font-size: .92rem; }
    .sep-col { width: 2px; background: var(--border2); padding: 0; }
    td.val-1-in  { color: var(--in-color); }
    td.val-0-in  { color: #334455; }
    td.val-1-out { color: var(--out-color); font-weight: 600; }
    td.val-0-out { color: #2a3a2a; font-weight: 600; }
    td.col-out   { background: rgba(74,222,128,.03); }

    /* ── KARNAUGH ── */
    .karnaugh-wrap { display: flex; gap: 2.5rem; flex-wrap: wrap; align-items: flex-start; }
    .kmap-container { overflow-x: auto; }
    .kmap-table { border-collapse: separate; border-spacing: 4px; font-family: var(--mono); }
    .kmap-table th { background: transparent; border: none; color: var(--muted); font-size: .75rem; padding: .3rem .5rem; text-align: center; border-bottom: none; }
    .kmap-cell { width: 54px; height: 54px; text-align: center; vertical-align: middle; font-size: 1.1rem; font-weight: 600; border-radius: 8px; border: 2px solid var(--border2); background: var(--surface2); color: #334455; transition: all .2s; }
    .kmap-cell.val-1 { color: var(--text); background: #1a2030; }
    .kmap-cell.resaltado { border-width: 2px; }
    .kmap-corner { background: transparent !important; border: none !important; }
    .leyenda { display: flex; flex-direction: column; gap: .6rem; min-width: 170px; }
    .leyenda h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .15rem; }
    .leyenda-item { display: flex; align-items: flex-start; gap: .55rem; }
    .leyenda-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; margin-top: .18rem; }
    .leyenda-texto { font-family: var(--mono); font-size: .84rem; color: var(--text); }
    .leyenda-mints { font-size: .7rem; color: var(--muted); font-family: var(--mono); }

    /* ── QUINE ── */
    .qm-paso { margin-bottom: 1.5rem; }
    .qm-paso:last-child { margin-bottom: 0; }
    .qm-titulo { font-size: .9rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
    .qm-explicacion { font-size: .82rem; color: var(--muted); line-height: 1.65; margin-bottom: .85rem; padding-left: .85rem; border-left: 2px solid var(--border2); }
    .qm-tabla { overflow-x: auto; margin-top: .5rem; }
    .qm-tabla table { font-size: .82rem; }
    .qm-tabla th { color: var(--accent); border-bottom: 1px solid var(--border2); font-size: .72rem; }
    .qm-tabla td { color: #b0b4c0; border-bottom: 1px solid var(--border); padding: .45rem .85rem; }
    .qm-tabla tr:last-child td { border-bottom: none; }
    .qm-tabla td.termino { color: var(--out-color); font-weight: 600; }
    .qm-tabla td.binario { color: var(--in-color); }

    /* ── BADGES MÉTODO ── */
    .metodo-badge { font-family: var(--mono); font-size: .7rem; padding: .18rem .55rem; border-radius: 4px; font-weight: 600; }
    .metodo-kmap  { background: #1a2a1a; color: var(--out-color); border: 1px solid #2a4a2a; }
    .metodo-quine { background: #1a1a2e; color: var(--accent);    border: 1px solid #2a2a4e; }
    .salida-titulo { font-size: .88rem; font-weight: 700; color: var(--out-color); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .75rem; font-family: var(--mono); }
    .salida-titulo::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

    /* ── LADDER ── */
    .ladder-wrap { overflow-x: auto; }
    .ladder-hint { font-size: .78rem; color: var(--muted); font-family: var(--mono); margin-bottom: 1rem; padding: .55rem .85rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
    .ladder-hint b { color: var(--in-color); }
    .state-panel { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .state-btn { font-family: var(--mono); font-size: .8rem; font-weight: 600; padding: .35rem .85rem; border-radius: 7px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: .4rem; }
    .state-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .18s; }
    .state-btn.on { border-color: var(--in-color); color: var(--in-color); background: #0c2a3a; }
    .state-btn.on .dot { background: var(--in-color); }
    .ladder-svg { display: block; }

    /* ── RESUMEN TIMERS ── */
    .timer-cards { display: flex; flex-direction: column; gap: .85rem; }
    .timer-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 1rem 1.25rem; display: flex; gap: 1rem; align-items: flex-start; }
    .timer-badge { font-family: var(--mono); font-size: .78rem; font-weight: 700; padding: .3rem .7rem; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
    .timer-badge.ton { background: #2a1500; color: var(--ton-color); border: 1px solid #5a3000; }
    .timer-badge.tof { background: #2a0a1a; color: var(--tof-color); border: 1px solid #5a1a3a; }
    .timer-info { display: flex; flex-direction: column; gap: .3rem; }
    .timer-nombre { font-family: var(--mono); font-size: .88rem; font-weight: 600; color: var(--text); }
    .timer-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; }
    .timer-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: .2rem; }
    .timer-meta span { font-family: var(--mono); font-size: .75rem; }
    .timer-cond  { color: var(--in-color); }
    .timer-time  { color: var(--ton-color); }
    .timer-salida { color: var(--out-color); }

    /* ── ERROR ── */
    .error-box { background: #1a0a0a; border: 1px solid #4a1a1a; border-radius: 12px; padding: 1rem 1.25rem; color: #f87171; font-family: var(--mono); font-size: .88rem; }

    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .vars-grid { grid-template-columns: 1fr; } .karnaugh-wrap { flex-direction: column; } }
  </style>
</head>
<body>

<!-- MENÚ LATERAL -->
<nav class="sidenav" id="sidenav">
  <div class="sidenav-item" onclick="irA('sec-analisis')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Análisis lógico</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-vars')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Variables</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-tabla')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Tabla de verdad</span>
  </div>
  <div class="sidenav-item" onclick="irA('sec-simplificacion')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Simplificación</span>
  </div>
  <div class="sidenav-item" onclick="irA('ladder-seccion')">
    <div class="sidenav-dot"></div>
    <span class="sidenav-label">Diagrama Ladder</span>
  </div>
</nav>

<header>
  <h1>Agente IA</h1>
  <span>by: Anthony De La Cruz</span>
</header>

<div class="input-wrap">
  <label>Describe tu problema lógico o secuencial</label>
  <textarea id="txt" placeholder="Ej combinacional: La alarma se activa si hay movimiento Y la puerta está abierta.&#10;Ej secuencial: La bomba arranca 5 segundos después de detectar nivel alto, y sigue 10s después de que baje."></textarea>
  <div class="input-footer">
    <span class="hint">Enter para enviar · Shift+Enter nueva línea</span>
    <button id="btn" onclick="enviar()"><span>Analizar</span></button>
  </div>
</div>

<div id="resultado"></div>

<!-- PANEL FLOTANTE -->
<div class="state-panel-float" id="state-panel-float">
  <span class="panel-label">Entradas</span>
</div>

<script>
/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
let ladderData  = null;
let inputStates = {};

const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const res = document.getElementById('resultado');

txt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

async function enviar() {
  const mensaje = txt.value.trim();
  if (!mensaje) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Analizando...</span>';
  res.style.display = 'none';
  ladderData  = null;
  inputStates = {};
  document.getElementById('sidenav').classList.remove('visible');

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: mensaje })
    });
    if (!r.ok) throw new Error(`Error del servidor: ${r.status}`);
    const data = await r.json();

    if (data.error) {
      res.innerHTML = `<div class="error-box fade-in">⚠ ${data.error}</div>`;
    } else {
      // Inicializar estados según tipo
      const entradas = data.entradas || [];
      entradas.forEach(v => { inputStates[v] = 0; });

      if (data.tipo === 'combinacional') {
        ladderData = data.ladder || null;
      } else {
        ladderData = data.ladder_secuencial || null;
      }

      res.innerHTML = data.tipo === 'combinacional'
        ? renderCombinacional(data)
        : renderSecuencial(data);

      construirPanelFlotante(entradas);
      setTimeout(() => { initSidenav(); initFloatPanel(); }, 100);
    }
    res.style.display = 'block';
  } catch(e) {
    res.innerHTML = `<div class="error-box fade-in">⚠ Error de conexión: ${e.message}</div>`;
    res.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = '<span>Analizar</span>';
}

/* ═══════════════════════════════════════
   RAMA COMBINACIONAL
═══════════════════════════════════════ */
function renderCombinacional(d) {
  return renderResumen(d)
       + renderVars(d)
       + renderTablaVerdad(d)
       + renderSimplificacion(d)
       + renderLadderCombinacional(d);
}

/* ── RESUMEN ── */
function renderResumen(d) {
  const exprs = d.salidas.map(s => `
    <div class="expr-fila">
      <span class="expr-nombre">${s.nombre}</span>
      <div class="expr-detalles">
        <div class="expr-linea"><span class="etiqueta">inferida</span><span class="formula formula-inferida">${s.expresion_display}</span></div>
        <div class="expr-linea"><span class="etiqueta">canónica</span><span class="formula formula-canonica">${s.expresion_canonica}</span></div>
        <div class="expr-linea"><span class="etiqueta">simplif.</span><span class="formula formula-simple">${s.expresion_simplificada}</span></div>
        <div class="expr-desc">${s.descripcion}</div>
      </div>
    </div>`).join('');
  return `
    <div class="seccion fade-in" id="sec-analisis">
      <div class="seccion-header"><span>Análisis lógico</span></div>
      <div class="seccion-body"><p class="resumen-texto">${d.resumen}</p><div class="expr-bloque">${exprs}</div></div>
    </div>`;
}

/* ── VARIABLES ── */
function renderVars(d) {
  const bIn  = d.entradas.map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = d.salidas.map(s => `<span class="badge badge-out">${s.nombre}</span>`).join('');
  return `
    <div class="vars-grid fade-in" id="sec-vars">
      <div class="var-card entradas"><h3>Entradas (${d.entradas.length})</h3><div class="badges">${bIn}</div></div>
      <div class="var-card salidas"><h3>Salidas (${d.salidas.length})</h3><div class="badges">${bOut}</div></div>
    </div>`;
}

/* ── TABLA DE VERDAD ── */
function renderTablaVerdad(d) {
  const nombres = d.salidas.map(s => s.nombre);
  const thIn  = d.entradas.map(v => `<th class="col-in">${v}</th>`).join('');
  const thOut = nombres.map(n => `<th class="col-out">${n}</th>`).join('');
  const filas = d.tabla.map(fila => {
    const tdIn  = d.entradas.map(v => `<td class="${fila[v]===1?'val-1-in':'val-0-in'}">${fila[v]}</td>`).join('');
    const tdOut = nombres.map(n => `<td class="col-out ${fila[n]===1?'val-1-out':'val-0-out'}">${fila[n]===-1?'?':fila[n]}</td>`).join('');
    return `<tr>${tdIn}<td class="sep-col"></td>${tdOut}</tr>`;
  }).join('');
  return `
    <div class="seccion fade-in" id="sec-tabla">
      <div class="seccion-header">
        <span>Tabla de verdad</span>
        <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">${d.tabla.length} filas · ${d.entradas.length + nombres.length} columnas</span>
      </div>
      <div class="tabla-scroll"><table><thead><tr>${thIn}<th class="sep-col"></th>${thOut}</tr></thead><tbody>${filas}</tbody></table></div>
    </div>`;
}

/* ── SIMPLIFICACIÓN ── */
function renderSimplificacion(d) {
  return d.salidas.map((s, idx) => {
    const badge = s.metodo === 'karnaugh'
      ? '<span class="metodo-badge metodo-kmap">Mapa de Karnaugh</span>'
      : '<span class="metodo-badge metodo-quine">Quine-McCluskey</span>';
    const contenido = s.metodo === 'karnaugh' ? renderKarnaugh(s) : renderQuine(s);
    const secId = idx === 0 ? 'id="sec-simplificacion"' : '';
    return `
      <div class="seccion fade-in" ${secId}>
        <div class="seccion-header"><span>Simplificación — ${s.nombre}</span>${badge}</div>
        <div class="seccion-body">
          <div class="salida-titulo">${s.nombre} = ${s.expresion_simplificada}</div>
          ${contenido}
        </div>
      </div>`;
  }).join('');
}

/* ── LADDER COMBINACIONAL ── */
function renderLadderCombinacional(d) {
  if (!d.ladder || !d.ladder.salidas || d.ladder.salidas.length === 0) return '';
  const botones = d.entradas.map(v => `
    <button class="state-btn" id="sbtn-${v}" onclick="toggleInput('${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');
  return `
    <div class="seccion fade-in" id="ladder-seccion">
      <div class="seccion-header">
        <span>Diagrama Ladder</span>
        <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">combinacional · interactivo</span>
      </div>
      <div class="seccion-body">
        <div class="ladder-hint"><b>Haz clic</b> en los botones de entrada para activar/desactivar · Los contactos y bobinas se actualizan en tiempo real</div>
        <div class="state-panel" id="state-panel-inline">${botones}</div>
        <div class="ladder-wrap" id="ladder-svg-wrap">${dibujarLadderCombinacional(d.ladder, d.entradas)}</div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   RAMA SECUENCIAL
═══════════════════════════════════════ */
function renderSecuencial(d) {
  return renderResumenSecuencial(d)
       + renderVarsSecuencial(d)
       + renderResumenTimers(d)
       + renderLadderSecuencial(d);
}

/* ── RESUMEN SECUENCIAL ── */
function renderResumenSecuencial(d) {
  return `
    <div class="seccion fade-in" id="sec-analisis">
      <div class="seccion-header"><span>Análisis del proceso</span><span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">secuencial</span></div>
      <div class="seccion-body"><p class="resumen-texto">${d.resumen}</p></div>
    </div>`;
}

/* ── VARIABLES SECUENCIAL ── */
function renderVarsSecuencial(d) {
  const bIn  = (d.entradas || []).map(v => `<span class="badge badge-in">${v}</span>`).join('');
  const bOut = (d.salidas  || []).map(v => `<span class="badge badge-out">${v}</span>`).join('');
  const bTon = (d.resumen_timers || []).filter(t => t.tipo === 'TON').map(t => `<span class="badge badge-ton">${t.nombre}</span>`).join('');
  const bTof = (d.resumen_timers || []).filter(t => t.tipo === 'TOF').map(t => `<span class="badge badge-tof">${t.nombre}</span>`).join('');
  return `
    <div class="vars-grid fade-in" id="sec-vars" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
      <div class="var-card entradas"><h3>Entradas (${(d.entradas||[]).length})</h3><div class="badges">${bIn || '<span style="color:var(--muted);font-size:.8rem">—</span>'}</div></div>
      <div class="var-card salidas"><h3>Salidas (${(d.salidas||[]).length})</h3><div class="badges">${bOut || '<span style="color:var(--muted);font-size:.8rem">—</span>'}</div></div>
      ${bTon ? `<div class="var-card"><h3 style="color:var(--ton-color)">TON</h3><div class="badges">${bTon}</div></div>` : ''}
      ${bTof ? `<div class="var-card"><h3 style="color:var(--tof-color)">TOF</h3><div class="badges">${bTof}</div></div>` : ''}
    </div>`;
}

/* ── CARDS DE TEMPORIZADORES ── */
function renderResumenTimers(d) {
  if (!d.resumen_timers || d.resumen_timers.length === 0) return '';
  const cards = d.resumen_timers.map(t => `
    <div class="timer-card">
      <span class="timer-badge ${t.tipo.toLowerCase()}">${t.tipo}</span>
      <div class="timer-info">
        <span class="timer-nombre">${t.nombre}</span>
        <span class="timer-desc">${t.descripcion}</span>
        <div class="timer-meta">
          <span class="timer-cond">↳ condición: ${t.condicion}</span>
          <span class="timer-time">⏱ ${t.tiempo_display}</span>
          <span class="timer-salida">→ ${t.salida}</span>
        </div>
      </div>
    </div>`).join('');
  return `
    <div class="seccion fade-in" id="sec-simplificacion">
      <div class="seccion-header"><span>Temporizadores identificados</span></div>
      <div class="seccion-body"><div class="timer-cards">${cards}</div></div>
    </div>`;
}

/* ── LADDER SECUENCIAL ── */
function renderLadderSecuencial(d) {
  if (!d.ladder_secuencial) return '';
  const botones = (d.entradas || []).map(v => `
    <button class="state-btn" id="sbtn-${v}" onclick="toggleInput('${v}')">
      <span class="dot"></span>${v}
    </button>`).join('');
  return `
    <div class="seccion fade-in" id="ladder-seccion">
      <div class="seccion-header">
        <span>Diagrama Ladder</span>
        <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted)">secuencial · interactivo</span>
      </div>
      <div class="seccion-body">
        <div class="ladder-hint"><b>Haz clic</b> en las entradas para simular · Los bloques TON/TOF muestran su estado de activación</div>
        <div class="state-panel" id="state-panel-inline">${botones}</div>
        <div class="ladder-wrap" id="ladder-svg-wrap">${dibujarLadderSecuencial(d.ladder_secuencial)}</div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   KARNAUGH
═══════════════════════════════════════ */
function renderKarnaugh(s) {
  const k = s.karnaugh;
  if (!k || !k.mapa || k.mapa.length === 0) {
    return `<p style="color:var(--muted);font-size:.88rem">${s.expresion_simplificada==='0'?'Salida siempre 0.':'Salida siempre 1.'}</p>`;
  }
  const minterms = new Set(k.minterms || []);
  const grupos   = k.grupos || [];
  const celdaColor = {};
  grupos.forEach(g => g.celdas.forEach(c => { if (!celdaColor[c]) celdaColor[c] = g.color; }));

  let thead = '<tr><th class="kmap-corner"> </th>';
  (k.col_labels || []).forEach(cl => { thead += `<th>${cl}</th>`; });
  thead += '</tr>';

  let tbody = '';
  k.mapa.forEach((fila, ri) => {
    tbody += `<tr><th>${(k.fila_labels||[])[ri]||''}</th>`;
    fila.forEach(idx => {
      const val    = minterms.has(idx) ? 1 : 0;
      const color  = celdaColor[idx] || null;
      const estilo = color ? `border-color:${color};box-shadow:0 0 0 2px ${color}33;background:${color}15;` : '';
      tbody += `<td class="kmap-cell${val===1?' val-1':''}${color?' resaltado':''}" style="${estilo}" title="m${idx}">${val}</td>`;
    });
    tbody += '</tr>';
  });

  const items = grupos.map(g => `
    <div class="leyenda-item">
      <div class="leyenda-dot" style="background:${g.color}"></div>
      <div><div class="leyenda-texto">${g.termino}</div><div class="leyenda-mints">m(${g.celdas.join(', ')})</div></div>
    </div>`).join('');

  return `
    <div class="karnaugh-wrap">
      <div class="kmap-container"><table class="kmap-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>
      <div class="leyenda"><h4>Grupos identificados</h4>${items||'<span style="color:var(--muted);font-size:.8rem">Sin grupos</span>'}</div>
    </div>`;
}

/* ═══════════════════════════════════════
   QUINE
═══════════════════════════════════════ */
function renderQuine(s) {
  if (!s.quine_pasos || s.quine_pasos.length === 0)
    return `<p style="color:var(--muted);font-size:.88rem">Sin pasos disponibles.</p>`;
  const sep = '<hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0">';
  return s.quine_pasos.map(paso => {
    let tablaHtml = '';
    if (paso.tipo === 'tabla_minterms') {
      tablaHtml = buildQmTable(paso.columnas, paso.filas.map(f =>
        `<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td style="text-align:center">${f.unos}</td></tr>`).join(''));
    } else if (paso.tipo === 'tabla_combinaciones') {
      tablaHtml = buildQmTable(paso.columnas, paso.filas.map(f =>
        `<tr><td>${f.combinacion}</td><td class="binario">${f.resultado}</td><td class="termino">${f.termino}</td></tr>`).join(''));
    } else if (paso.tipo === 'tabla_implicantes') {
      tablaHtml = buildQmTable(paso.columnas, paso.filas.map(f =>
        `<tr><td>${f.minterms.join(', ')}</td><td class="binario">${f.binario}</td><td class="termino">${f.termino}</td></tr>`).join(''));
    }
    return `<div class="qm-paso"><div class="qm-titulo">${paso.titulo}</div><div class="qm-explicacion">${paso.explicacion}</div>${tablaHtml}</div>`;
  }).join(sep);
}
function buildQmTable(cols, filas) {
  return `<div class="qm-tabla"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${filas}</tbody></table></div>`;
}

/* ═══════════════════════════════════════
   TOGGLE ENTRADA
═══════════════════════════════════════ */
function toggleInput(v) {
  inputStates[v] = inputStates[v] === 1 ? 0 : 1;
  ['sbtn', 'sbtn-float'].forEach(p => {
    const b = document.getElementById(`${p}-${v}`);
    if (b) b.classList.toggle('on', inputStates[v] === 1);
  });
  const wrap = document.getElementById('ladder-svg-wrap');
  if (!wrap || !ladderData) return;
  wrap.innerHTML = ladderData.tipo === 'secuencial'
    ? dibujarLadderSecuencial(ladderData)
    : dibujarLadderCombinacional(ladderData, Object.keys(inputStates));
}

/* ═══════════════════════════════════════
   SVG — LADDER COMBINACIONAL
═══════════════════════════════════════ */
function dibujarLadderCombinacional(ladder, entradas) {
  const salidas        = ladder.salidas;
  const RAIL_LEFT      = 30;
  const RAIL_RIGHT_OFF = 120;
  const ROW_H          = 70;
  const CONTACT_W      = 55;
  const CONTACT_H      = 28;
  const COIL_R         = 18;
  const PAD_TOP        = 30;
  const PAD_BOT        = 30;

  let maxCt = 0;
  salidas.forEach(s => s.escalones.forEach(e => { if (e.contactos.length > maxCt) maxCt = e.contactos.length; }));

  const AREA_W     = Math.max(420, maxCt * (CONTACT_W + 16) + 80);
  const RAIL_RIGHT = RAIL_LEFT + AREA_W;
  let totalFilas   = 0;
  salidas.forEach(s => { totalFilas += s.escalones.length; });
  totalFilas += Math.max(0, salidas.length - 1);

  const svgH = PAD_TOP + totalFilas * ROW_H + PAD_BOT;
  const svgW = RAIL_RIGHT + RAIL_RIGHT_OFF + 20;

  const CA = '#4ade80', CI = '#2e323d', CR = '#2e323d', CT = '#e8eaf0', CM = '#6b7080', CNC = '#38bdf8', BG = '#161920';
  let els = [];

  els.push(`<line x1="${RAIL_LEFT}" y1="${PAD_TOP-10}" x2="${RAIL_LEFT}" y2="${svgH-PAD_BOT+10}" stroke="${CR}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<line x1="${RAIL_RIGHT}" y1="${PAD_TOP-10}" x2="${RAIL_RIGHT}" y2="${svgH-PAD_BOT+10}" stroke="${CR}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<text x="${RAIL_LEFT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L+</text>`);
  els.push(`<text x="${RAIL_RIGHT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L-</text>`);

  let curY = PAD_TOP; let primera = true;
  salidas.forEach(sal => {
    if (!primera) els.push(`<line x1="${RAIL_LEFT+10}" y1="${curY-10}" x2="${RAIL_RIGHT-10}" y2="${curY-10}" stroke="${CR}" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>`);
    primera = false;
    const nEsc = sal.escalones.length;
    const bloqueH = nEsc * ROW_H;
    const midY    = curY + bloqueH / 2;
    const bobActiva = sal.escalones.some(esc => esc.contactos.every(ct => {
      const v = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
      return ct.negado ? v === 0 : v === 1;
    }));

    if (nEsc > 1) els.push(`<line x1="${RAIL_LEFT+4}" y1="${curY+ROW_H/2}" x2="${RAIL_LEFT+4}" y2="${curY+bloqueH-ROW_H/2}" stroke="${CI}" stroke-width="2.5"/>`);

    sal.escalones.forEach((esc, ei) => {
      const my = curY + ei * ROW_H + ROW_H / 2;
      const activo = esc.contactos.every(ct => {
        const v = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        return ct.negado ? v === 0 : v === 1;
      });
      const wc = activo ? CA : CI;
      els.push(`<line x1="${RAIL_LEFT+4}" y1="${my}" x2="${RAIL_LEFT+30}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);

      let xC = RAIL_LEFT + 30;
      esc.contactos.forEach((ct, ci) => {
        const v  = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        const ca = ct.negado ? v === 0 : v === 1;
        const cc = ca ? CA : CI;
        const lc = ct.negado ? CNC : CT;
        if (ci > 0) { els.push(`<line x1="${xC}" y1="${my}" x2="${xC+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`); xC += 10; }
        const cx = xC + CONTACT_W / 2;
        els.push(`<line x1="${cx-10}" y1="${my-CONTACT_H/2}" x2="${cx-10}" y2="${my+CONTACT_H/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx+10}" y1="${my-CONTACT_H/2}" x2="${cx+10}" y2="${my+CONTACT_H/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx-10}" y1="${my}" x2="${cx+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`);
        if (ct.negado) els.push(`<line x1="${cx-8}" y1="${my+CONTACT_H/2-4}" x2="${cx+8}" y2="${my-CONTACT_H/2+4}" stroke="${cc}" stroke-width="2"/>`);
        els.push(`<text x="${cx}" y="${my-CONTACT_H/2-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${lc}">${ct.negado?ct.var+"'":ct.var}</text>`);
        xC += CONTACT_W;
      });
      els.push(`<line x1="${xC}" y1="${my}" x2="${RAIL_RIGHT-4}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
    });

    if (nEsc > 1) els.push(`<line x1="${RAIL_RIGHT-4}" y1="${curY+ROW_H/2}" x2="${RAIL_RIGHT-4}" y2="${curY+bloqueH-ROW_H/2}" stroke="${CI}" stroke-width="2.5"/>`);

    const bc = bobActiva ? CA : CI;
    const cx = RAIL_RIGHT + 40;
    els.push(`<line x1="${RAIL_RIGHT-4}" y1="${midY}" x2="${cx-COIL_R}" y2="${midY}" stroke="${bc}" stroke-width="2.5"/>`);
    els.push(`<circle cx="${cx}" cy="${midY}" r="${COIL_R}" fill="${bobActiva?'#0c2a1a':'#12151d'}" stroke="${bobActiva?CA:'#2e323d'}" stroke-width="2.5"/>`);
    els.push(`<text x="${cx}" y="${midY+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="${bobActiva?CA:CM}">( )</text>`);
    els.push(`<text x="${cx}" y="${midY-COIL_R-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${bobActiva?CA:CM}">${sal.nombre}</text>`);
    els.push(`<line x1="${cx+COIL_R}" y1="${midY}" x2="${RAIL_RIGHT+RAIL_RIGHT_OFF-10}" y2="${midY}" stroke="${bc}" stroke-width="2.5"/>`);
    curY += nEsc * ROW_H;
  });

  return `<svg class="ladder-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${svgW}" height="${svgH}" fill="${BG}" rx="10"/>
    ${els.join('\n')}
  </svg>`;
}

/* ═══════════════════════════════════════
   SVG — LADDER SECUENCIAL (TON / TOF)
═══════════════════════════════════════ */
function dibujarLadderSecuencial(ladder) {
  const escalones      = ladder.escalones || [];
  const RAIL_LEFT      = 30;
  const RAIL_RIGHT_OFF = 160;
  const ROW_H          = 80;
  const CONTACT_W      = 65;
  const CONTACT_H      = 28;
  const TIMER_W        = 100;
  const TIMER_H        = 52;
  const COIL_R         = 18;
  const PAD_TOP        = 30;
  const PAD_BOT        = 30;

  // Calcular ancho
  let maxW = 0;
  escalones.forEach(esc => {
    const w = esc.contactos.length * (CONTACT_W + 12) + (esc.timer ? TIMER_W + 20 : COIL_R * 2 + 20);
    if (w > maxW) maxW = w;
  });

  const AREA_W     = Math.max(500, maxW + 60);
  const RAIL_RIGHT = RAIL_LEFT + AREA_W;
  const svgH       = PAD_TOP + escalones.length * ROW_H + PAD_BOT;
  const svgW       = RAIL_RIGHT + RAIL_RIGHT_OFF + 20;

  const CA = '#4ade80', CI = '#2e323d', CR = '#2e323d', CT = '#e8eaf0';
  const CM = '#6b7080', CNC = '#38bdf8', BG = '#161920';
  const CTON = '#fb923c', CTOF = '#f472b6';

  let els = [];

  // Rieles
  els.push(`<line x1="${RAIL_LEFT}" y1="${PAD_TOP-10}" x2="${RAIL_LEFT}" y2="${svgH-PAD_BOT+10}" stroke="${CR}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<line x1="${RAIL_RIGHT}" y1="${PAD_TOP-10}" x2="${RAIL_RIGHT}" y2="${svgH-PAD_BOT+10}" stroke="${CR}" stroke-width="4" stroke-linecap="round"/>`);
  els.push(`<text x="${RAIL_LEFT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L+</text>`);
  els.push(`<text x="${RAIL_RIGHT}" y="${PAD_TOP-16}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CM}">L-</text>`);

  escalones.forEach((esc, i) => {
    const my = PAD_TOP + i * ROW_H + ROW_H / 2;

    // Separador
    if (i > 0) els.push(`<line x1="${RAIL_LEFT+10}" y1="${my-ROW_H/2}" x2="${RAIL_RIGHT-10}" y2="${my-ROW_H/2}" stroke="${CR}" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>`);

    // Evaluar condición de los contactos
    const condActiva = esc.contactos.every(ct => {
      if (ct.es_timer) return false; // timer contact siempre inactivo en sim estática
      const v = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
      return ct.negado ? v === 0 : v === 1;
    });
    const wc = condActiva ? CA : CI;

    // Línea inicio
    els.push(`<line x1="${RAIL_LEFT+4}" y1="${my}" x2="${RAIL_LEFT+30}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);

    let xC = RAIL_LEFT + 30;

    // Dibujar contactos
    esc.contactos.forEach((ct, ci) => {
      if (ci > 0) { els.push(`<line x1="${xC}" y1="${my}" x2="${xC+10}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`); xC += 10; }

      const cx = xC + CONTACT_W / 2;

      if (ct.es_timer) {
        // Contacto de temporizador — rectángulo punteado con T
        const tc = ct.tipo_timer === 'TON' ? CTON : CTOF;
        els.push(`<rect x="${cx-18}" y="${my-14}" width="36" height="28" rx="4" fill="none" stroke="${tc}" stroke-width="1.5" stroke-dasharray="4 2"/>`);
        els.push(`<text x="${cx}" y="${my+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="10" font-weight="600" fill="${tc}">${ct.var}</text>`);
        els.push(`<text x="${cx}" y="${my-14-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${tc}">${ct.tipo_timer}</text>`);
      } else {
        const v  = inputStates[ct.var] !== undefined ? inputStates[ct.var] : 0;
        const ca = ct.negado ? v === 0 : v === 1;
        const cc = ca ? CA : CI;
        const lc = ct.negado ? CNC : CT;
        // Contacto estándar
        els.push(`<line x1="${cx-10}" y1="${my-CONTACT_H/2}" x2="${cx-10}" y2="${my+CONTACT_H/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx+10}" y1="${my-CONTACT_H/2}" x2="${cx+10}" y2="${my+CONTACT_H/2}" stroke="${cc}" stroke-width="2.5"/>`);
        els.push(`<line x1="${cx-10}" y1="${my}" x2="${cx+10}" y2="${my}" stroke="${cc}" stroke-width="2.5"/>`);
        if (ct.negado) els.push(`<line x1="${cx-8}" y1="${my+CONTACT_H/2-4}" x2="${cx+8}" y2="${my-CONTACT_H/2+4}" stroke="${cc}" stroke-width="2"/>`);
        els.push(`<text x="${cx}" y="${my-CONTACT_H/2-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${lc}">${ct.negado?ct.var+"'":ct.var}</text>`);
      }
      xC += CONTACT_W;
    });

    // Línea antes del bloque final
    els.push(`<line x1="${xC}" y1="${my}" x2="${xC+14}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);
    xC += 14;

    if (esc.tipo === 'timer_coil' && esc.timer) {
      // ══ BLOQUE TEMPORIZADOR ══
      const t   = esc.timer;
      const tc  = t.tipo === 'TON' ? CTON : CTOF;
      const tf  = condActiva ? '#2a1200' : '#12151d';
      const bx  = xC;
      const by  = my - TIMER_H / 2;

      // Caja del timer
      els.push(`<rect x="${bx}" y="${by}" width="${TIMER_W}" height="${TIMER_H}" rx="6" fill="${tf}" stroke="${condActiva ? tc : '#2e323d'}" stroke-width="2"/>`);

      // Tipo (TON / TOF)
      els.push(`<text x="${bx + TIMER_W/2}" y="${by+14}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="700" fill="${tc}">${t.tipo}</text>`);

      // Nombre
      els.push(`<text x="${bx + TIMER_W/2}" y="${by+28}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${CT}">${t.nombre}</text>`);

      // Tiempo
      els.push(`<text x="${bx + TIMER_W/2}" y="${by+42}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="${condActiva ? tc : CM}">PT: ${t.tiempo_display}</text>`);

      // Línea de salida al riel
      els.push(`<line x1="${bx + TIMER_W}" y1="${my}" x2="${RAIL_RIGHT-4}" y2="${my}" stroke="${wc}" stroke-width="2.5"/>`);

      // Etiqueta sobre el bloque
      els.push(`<text x="${bx + TIMER_W/2}" y="${by-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="${CM}">bobina timer</text>`);

    } else if (esc.tipo === 'timer_contact') {
      // ══ BOBINA DE SALIDA ══
      const coilX = xC + COIL_R + 5;
      // cable a bobina
      els.push(`<line x1="${xC}" y1="${my}" x2="${coilX - COIL_R}" y2="${my}" stroke="${CI}" stroke-width="2.5"/>`);
      els.push(`<circle cx="${coilX}" cy="${my}" r="${COIL_R}" fill="#12151d" stroke="#2e323d" stroke-width="2.5"/>`);
      els.push(`<text x="${coilX}" y="${my+1}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="${CM}">( )</text>`);
      els.push(`<text x="${coilX}" y="${my-COIL_R-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="${CM}">${esc.bobina}</text>`);
      // cable al riel
      els.push(`<line x1="${coilX+COIL_R}" y1="${my}" x2="${RAIL_RIGHT+RAIL_RIGHT_OFF-10}" y2="${my}" stroke="${CI}" stroke-width="2.5"/>`);
    }
  });

  return `<svg class="ladder-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${svgW}" height="${svgH}" fill="${BG}" rx="10"/>
    ${els.join('\n')}
  </svg>`;
}

/* ═══════════════════════════════════════
   PANEL FLOTANTE
═══════════════════════════════════════ */
function construirPanelFlotante(entradas) {
  const panel = document.getElementById('state-panel-float');
  panel.innerHTML = '<span class="panel-label">Entradas</span>';
  entradas.forEach(v => {
    const b = document.createElement('button');
    b.className   = 'state-btn';
    b.id          = `sbtn-float-${v}`;
    b.onclick     = () => toggleInput(v);
    b.innerHTML   = `<span class="dot"></span>${v}`;
    panel.appendChild(b);
  });
}

function initFloatPanel() {
  const seccion     = document.getElementById('ladder-seccion');
  const panelInline = document.getElementById('state-panel-inline');
  const panelFloat  = document.getElementById('state-panel-float');
  if (!seccion || !panelFloat || !panelInline) return;
  function actualizar() {
    const sr = seccion.getBoundingClientRect();
    const ir = panelInline.getBoundingClientRect();
    const sv = sr.bottom > 0 && sr.top < window.innerHeight;
    const iv = ir.bottom > 80 && ir.top < window.innerHeight;
    panelFloat.classList.toggle('visible', sv && !iv);
  }
  window.addEventListener('scroll', actualizar, { passive: true });
  actualizar();
}

/* ═══════════════════════════════════════
   MENÚ LATERAL
═══════════════════════════════════════ */
function irA(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function initSidenav() {
  const nav = document.getElementById('sidenav');
  if (!nav) return;
  nav.classList.add('visible');
  const ids   = ['sec-analisis', 'sec-vars', 'sec-tabla', 'sec-simplificacion', 'ladder-seccion'];
  const items = nav.querySelectorAll('.sidenav-item');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const idx = ids.indexOf(e.target.id);
      if (idx !== -1) items[idx]?.classList.toggle('active', e.isIntersecting);
    });
  }, { threshold: 0.25 });
  ids.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
}
</script>
